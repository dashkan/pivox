syntax = "proto3";

package pivox.api.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "pivox/iam/v1/iam_policy.proto";
import "pivox/iam/v1/policy.proto";

option go_package = "pivox/api/v1;apiv1";

// Allow users to create and manage tag keys.
service TagKeys {
  option (google.api.default_host) = "api.pivox.io";

  // Lists all TagKeys for a parent resource.
  rpc ListTagKeys(ListTagKeysRequest) returns (ListTagKeysResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=organizations/*}/tagKeys"
      additional_bindings: {get: "/v1/{parent=organizations/*/projects/*}/tagKeys"}
    };
    option (google.api.method_signature) = "parent";
  }

  // Retrieves a TagKey. This method will return `PERMISSION_DENIED` if the
  // key does not exist or the user does not have permission to view it.
  rpc GetTagKey(GetTagKeyRequest) returns (TagKey) {
    option (google.api.http) = {
      get: "/v1/{name=organizations/*/tagKeys/*}"
      additional_bindings: {get: "/v1/{name=organizations/*/projects/*/tagKeys/*}"}
    };
    option (google.api.method_signature) = "name";
  }

  // Creates a new TagKey. If another request with the same parameters is
  // sent while the original request is in process, the second request
  // will receive an error. A maximum of 1000 TagKeys can exist under a parent
  // at any given time.
  rpc CreateTagKey(CreateTagKeyRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*}/tagKeys"
      body: "tag_key"
      additional_bindings: {
        post: "/v1/{parent=organizations/*/projects/*}/tagKeys"
        body: "tag_key"
      }
    };
    option (google.api.method_signature) = "parent,tag_key,tag_key_id";
    option (google.longrunning.operation_info) = {
      response_type: "TagKey"
      metadata_type: "CreateTagKeyMetadata"
    };
  }

  // Updates the attributes of the TagKey resource.
  rpc UpdateTagKey(UpdateTagKeyRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1/{tag_key.name=organizations/*/tagKeys/*}"
      body: "tag_key"
      additional_bindings: {
        patch: "/v1/{tag_key.name=organizations/*/projects/*/tagKeys/*}"
        body: "tag_key"
      }
    };
    option (google.api.method_signature) = "tag_key,update_mask";
    option (google.longrunning.operation_info) = {
      response_type: "TagKey"
      metadata_type: "UpdateTagKeyMetadata"
    };
  }

  // Deletes a TagKey. The TagKey cannot be deleted if it has any child
  // TagValues.
  rpc DeleteTagKey(DeleteTagKeyRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      delete: "/v1/{name=organizations/*/tagKeys/*}"
      additional_bindings: {delete: "/v1/{name=organizations/*/projects/*/tagKeys/*}"}
    };
    option (google.api.method_signature) = "name";
    option (google.longrunning.operation_info) = {
      response_type: "TagKey"
      metadata_type: "DeleteTagKeyMetadata"
    };
  }

  // Gets the access control policy for a TagKey. The returned policy may be
  // empty if no such policy or resource exists. The `resource` field should
  // be the TagKey's resource name.
  // The caller must have
  // `pivox.api/tagKeys.getIamPolicy` permission on
  // the specified TagKey.
  rpc GetIamPolicy(pivox.iam.v1.GetIamPolicyRequest) returns (pivox.iam.v1.Policy) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/tagKeys/*}:getIamPolicy"
      body: "*"
      additional_bindings: {
        post: "/v1/{name=organizations/*/projects/*/tagKeys/*}:getIamPolicy"
        body: "*"
      }
    };
    option (google.api.method_signature) = "name";
  }

  // Sets the access control policy on a TagKey, replacing any existing
  // policy. The `resource` field should be the TagKey's resource name.
  // The caller must have `resourcemanager.tagKeys.setIamPolicy` permission
  // on the identified tagValue.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: SetIamPolicy returns Policy per IAM convention. --)
  rpc SetIamPolicy(pivox.iam.v1.SetIamPolicyRequest) returns (pivox.iam.v1.Policy) {
    option (google.api.http) = {
      post: "/v1/{resource=organizations/*/tagKeys/*}:setIamPolicy"
      body: "*"
      additional_bindings: {
        post: "/v1/{resource=organizations/*/projects/*/tagKeys/*}:setIamPolicy"
        body: "*"
      }
    };
    option (google.api.method_signature) = "resource,policy";
  }

  // Returns permissions that a caller has on the specified TagKey.
  // The `resource` field should be the TagKey's resource name.
  //
  // There are no permissions required for making this API call.
  rpc TestIamPermissions(pivox.iam.v1.TestIamPermissionsRequest) returns (pivox.iam.v1.TestIamPermissionsResponse) {
    option (google.api.http) = {
      post: "/v1/{resource=organizations/*/tagKeys/*}:testIamPermissions"
      body: "*"
      additional_bindings: {
        post: "/v1/{resource=organizations/*/projects/*/tagKeys/*}:testIamPermissions"
        body: "*"
      }
    };
    option (google.api.method_signature) = "resource,permissions";
  }
}

// A TagKey, used to group a set of TagValues.
message TagKey {
  option (google.api.resource) = {
    type: "pivox.api/TagKey"
    pattern: "organizations/{organization}/tagKeys/{tag_key}"
    pattern: "organizations/{organization}/projects/{project}/tagKeys/{tag_key}"
    plural: "tagKeys"
    singular: "tagKey"
  };

  // Immutable. The resource name for a TagKey. Must be in the format
  // `organizations/{organization}/tagKeys/{tag_key}` or
  // `organizations/{organization}/projects/{project}/tagKeys/{tag_key}`.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Optional. User-assigned description of the TagKey. Must not exceed 256
  // characters.
  //
  // Read-write.
  string description = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 256
  ];

  // Output only. Creation time.
  google.protobuf.Timestamp create_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Update time.
  google.protobuf.Timestamp update_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Entity tag which users can pass to prevent race conditions. This
  // field is always set in server responses. See UpdateTagKeyRequest for
  // details.
  string etag = 8 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Labels associated with this tag key.
  // Labels are key-value pairs that can be used to organize and track resources.
  map<string, string> annotations = 13 [(google.api.field_behavior) = OPTIONAL];
}

// The request message for listing all TagKeys under a parent resource.
message ListTagKeysRequest {
  // Required. The resource name of the TagKey's parent.
  // Must be of the form `organizations/{org_id}` or
  // `organizations/{org_id}/projects/{project_id}`.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/TagKey"},
    (buf.validate.field).required = true
  ];

  // Optional. The maximum number of TagKeys to return in the response. The
  // server allows a maximum of 300 TagKeys to return. If unspecified, the
  // server will use 100 as the default.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A pagination token returned from a previous call to `ListTagKey`
  // that indicates where this listing should continue from.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. An expression for filtering the results of the request.
  // Filter rules are case insensitive. Filterable fields:
  //
  // + `shortName`
  // + `description`
  //
  // Examples:
  //
  // + `shortName = "environment"` — exact match on short name.
  // + `description = "Environment*"` — description starts with prefix.
  //
  // For more information, see [AIP-160](https://aip.dev/160).
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A comma-separated list of fields to order by. The default
  // order is ascending. Use "desc" after a field name for descending.
  // Supported fields:
  //
  // + `shortName`
  // + `createTime`
  //
  // Example: `shortName`
  //
  // If not specified, the results are ordered by `shortName` ascending.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// The ListTagKeys response message.
message ListTagKeysResponse {
  // List of TagKeys that live under the specified parent in the request.
  repeated TagKey tag_keys = 1;

  // A pagination token returned from a previous call to `ListTagKeys`
  // that indicates from where listing should continue.
  string next_page_token = 2;
}

// The request message for getting a TagKey.
message GetTagKeyRequest {
  // Required. A resource name in the format
  // `organizations/{organization}/tagKeys/{tag_key}`.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/TagKey"},
    (buf.validate.field).required = true
  ];
}

// The request message for creating a TagKey.
message CreateTagKeyRequest {
  // Required. The resource name of the parent. Must be of the form
  // `organizations/{org_id}` or
  // `organizations/{org_id}/projects/{project_id}`.
  string parent = 4 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/TagKey"},
    (buf.validate.field).required = true
  ];

  // Required. The TagKey to be created. Only fields `description`
  // are considered during the creation request.
  TagKey tag_key = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Required. The user-assigned short name for the TagKey.
  // Must be unique for TagKeys within the same parent.
  string tag_key_id = 3 [(google.api.field_behavior) = REQUIRED];

  // Optional. Set to true to perform validations necessary for creating the
  // resource, but not actually perform the action.
  bool validate_only = 2 [(google.api.field_behavior) = OPTIONAL];
}

// The request message for updating a TagKey.
message UpdateTagKeyRequest {
  // Required. The new definition of the TagKey. Only the `description` and
  // `etag` fields can be updated by this request. If the `etag` field is not
  // empty, it must match the `etag` field of the existing tag key. Otherwise,
  // `ABORTED` will be returned.
  TagKey tag_key = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. Fields to be updated. The mask may only contain `description` or
  // `etag`. If omitted entirely, both `description` and `etag` are assumed to
  // be significant.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, and the tag key is not found, a new tag key will be created.
  // In this situation, update_mask is ignored.
  bool allow_missing = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Set as true to perform validations necessary for updating the resource, but
  // not actually perform the action.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// The request message for deleting a TagKey.
message DeleteTagKeyRequest {
  // Required. The resource name of a TagKey to be deleted in the format
  // `organizations/{organization}/tagKeys/{tag_key}`. The TagKey cannot be a
  // parent of any existing TagValues or it will not be deleted successfully.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/TagKey"},
    (buf.validate.field).required = true
  ];

  // Optional. Set as true to perform validations necessary for deletion, but
  // not actually perform the action.
  bool validate_only = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The etag known to the client for the expected state of the
  // TagKey. This is to be used for optimistic concurrency.
  string etag = 3 [(google.api.field_behavior) = OPTIONAL];
}

// A status object which is used as the `metadata` field for the Operation
// returned by CreateTagKey.
message CreateTagKeyMetadata {}

// A status object which is used as the `metadata` field for the Operation
// returned by UpdateTagKey.
message UpdateTagKeyMetadata {}

// A status object which is used as the `metadata` field for the Operation
// returned by DeleteTagKey.
message DeleteTagKeyMetadata {}
