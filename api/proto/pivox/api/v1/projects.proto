syntax = "proto3";

package pivox.api.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "pivox/iam/v1/iam_policy.proto";
import "pivox/iam/v1/policy.proto";

option go_package = "pivox/api/v1;apiv1";

// Manages Pivox Projects.
service Projects {
  option (google.api.default_host) = "api.pivox.io";

  // Retrieves the project identified by the specified `name` (for example,
  // `organizations/123/projects/my-project`).
  //
  // The caller must have `resourcemanager.projects.get` permission
  // for this project.
  rpc GetProject(GetProjectRequest) returns (Project) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/projects/*}"};
    option (google.api.method_signature) = "name";
  }

  // Lists projects that are direct children of the specified organization
  // resource. `list()` provides a strongly consistent view of the
  // projects underneath the specified parent resource. `list()` returns
  // projects sorted based upon the (ascending) lexical ordering of their
  // `display_name`. The caller must have `resourcemanager.projects.list`
  // permission on the identified parent.
  rpc ListProjects(ListProjectsRequest) returns (ListProjectsResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*}/projects"};
    option (google.api.method_signature) = "parent";
  }

  // Creates a new project under the specified organization.
  rpc CreateProject(CreateProjectRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*}/projects"
      body: "project"
    };
    option (google.api.method_signature) = "parent,project,project_id";
    option (google.longrunning.operation_info) = {
      response_type: "Project"
      metadata_type: "CreateProjectMetadata"
    };
  }

  // Updates the `display_name` and labels of the project identified by the
  // specified `name` (for example, `organizations/123/projects/my-project`).
  // Deleting all labels requires an update mask for labels field.
  //
  // The caller must have `resourcemanager.projects.update` permission for this
  // project.
  rpc UpdateProject(UpdateProjectRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1/{project.name=organizations/*/projects/*}"
      body: "project"
    };
    option (google.api.method_signature) = "project,update_mask";
    option (google.longrunning.operation_info) = {
      response_type: "Project"
      metadata_type: "UpdateProjectMetadata"
    };
  }

  // Marks the project identified by the specified
  // `name` (for example, `organizations/123/projects/my-project`) for deletion.
  //
  // This method will only affect the project if it has a lifecycle state of
  // [ACTIVE][pivox.api.v1.Project.State.ACTIVE].
  //
  // This method changes the Project's lifecycle state from
  // [ACTIVE][pivox.api.v1.Project.State.ACTIVE]
  // to
  // [DELETE_REQUESTED][pivox.api.v1.Project.State.DELETE_REQUESTED].
  // The deletion starts at an unspecified time,
  // at which point the Project is no longer accessible.
  //
  // Until the deletion completes, you can check the lifecycle state
  // checked by retrieving the project with [GetProject]
  // [pivox.api.v1.Projects.GetProject],
  // and the project remains visible to [ListProjects]
  // [pivox.api.v1.Projects.ListProjects].
  // However, you cannot update the project.
  //
  // After the deletion completes, the project is not retrievable by
  // the [GetProject]
  // [pivox.api.v1.Projects.GetProject] and
  // [ListProjects]
  // [pivox.api.v1.Projects.ListProjects] method.
  //
  // This method behaves idempotently, such that deleting a `DELETE_REQUESTED`
  // project will not cause an error, but also won't do anything.
  //
  // The caller must have `resourcemanager.projects.delete` permissions for this
  // project.
  rpc DeleteProject(DeleteProjectRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/projects/*}"};
    option (google.api.method_signature) = "name";
    option (google.longrunning.operation_info) = {
      response_type: "Project"
      metadata_type: "DeleteProjectMetadata"
    };
  }

  // Restores the project identified by the specified
  // `name` (for example, `organizations/123/projects/my-project`).
  // You can only use this method for a project that has a lifecycle state of
  // [DELETE_REQUESTED]
  // [Projects.State.DELETE_REQUESTED].
  // After deletion starts, the project cannot be restored.
  //
  // The caller must have `resourcemanager.projects.undelete` permission for
  // this project.
  rpc UndeleteProject(UndeleteProjectRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*}:undelete"
      body: "*"
    };
    option (google.api.method_signature) = "name";
    option (google.longrunning.operation_info) = {
      response_type: "Project"
      metadata_type: "UndeleteProjectMetadata"
    };
  }

  // Returns the IAM access control policy for the specified project.
  // Permission is denied if the policy or the resource do not exist.
  rpc GetIamPolicy(pivox.iam.v1.GetIamPolicyRequest) returns (pivox.iam.v1.Policy) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*}:getIamPolicy"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Sets the IAM access control policy for the specified project.
  //
  // CAUTION: This method will replace the existing policy, and cannot be used
  // to append additional IAM settings.
  //
  // Note: Removing service accounts from policies or changing their roles can
  // render services completely inoperable. It is important to understand how
  // the service account is being used before removing or updating its roles.
  //
  // The following constraints apply when using `setIamPolicy()`:
  //
  // + Project does not support `allUsers` and `allAuthenticatedUsers` as
  // `members` in a `Binding` of a `Policy`.
  //
  // + The owner role can be granted to a `user`, `serviceAccount`, or a group
  // that is part of an organization. For example,
  // group@myownpersonaldomain.com could be added as an owner to a project in
  // the myownpersonaldomain.com organization, but not the examplepetstore.com
  // organization.
  //
  // + Service accounts can be made owners of a project directly
  // without any restrictions. However, to be added as an owner, a user must be
  // invited using the Pivox Console and must accept the invitation.
  //
  // + A user cannot be granted the owner role using `setIamPolicy()`. The user
  // must be granted the owner role using the Pivox Console and must
  // explicitly accept the invitation.
  //
  // + Invitations to grant the owner role cannot be sent using
  // `setIamPolicy()`;
  // they must be sent only using the Pivox Console.
  //
  // + If the project is not part of an organization, there must be at least
  // one owner who has accepted the Terms of Service (ToS) agreement in the
  // policy. Calling `setIamPolicy()` to remove the last ToS-accepted owner
  // from the policy will fail. This restriction also applies to legacy
  // projects that no longer have owners who have accepted the ToS. Edits to
  // IAM policies will be rejected until the lack of a ToS-accepting owner is
  // rectified. If the project is part of an organization, you can remove all
  // owners, potentially making the organization inaccessible.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: SetIamPolicy returns Policy per IAM convention. --)
  rpc SetIamPolicy(pivox.iam.v1.SetIamPolicyRequest) returns (pivox.iam.v1.Policy) {
    option (google.api.http) = {
      post: "/v1/{resource=organizations/*/projects/*}:setIamPolicy"
      body: "*"
    };
    option (google.api.method_signature) = "resource,policy";
  }

  // Returns permissions that a caller has on the specified project.
  rpc TestIamPermissions(pivox.iam.v1.TestIamPermissionsRequest) returns (pivox.iam.v1.TestIamPermissionsResponse) {
    option (google.api.http) = {
      post: "/v1/{resource=organizations/*/projects/*}:testIamPermissions"
      body: "*"
    };
    option (google.api.method_signature) = "resource,permissions";
  }
}

// A project is a high-level Pivox entity. It is a
// container for ACLs, APIs, and other Pivox resources.
message Project {
  option (google.api.resource) = {
    type: "pivox.api/Project"
    pattern: "organizations/{organization}/projects/{project}"
    plural: "projects"
    singular: "project"
  };

  // Project lifecycle states.
  enum State {
    // Unspecified state.  This is only used/useful for distinguishing
    // unset values.
    STATE_UNSPECIFIED = 0;

    // The normal and active state.
    ACTIVE = 1;

    // The project has been marked for deletion by the user
    // (by invoking
    // [DeleteProject][pivox.api.v1.Projects.DeleteProject])
    // or by the system (Pivox).
    // This can generally be reversed by invoking [UndeleteProject]
    // [pivox.api.v1.Projects.UndeleteProject].
    DELETE_REQUESTED = 2;
  }

  // Output only. The unique resource name of the project.
  //
  // Example: `organizations/123/projects/my-project`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Output only. The project lifecycle state.
  State state = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. A user-assigned display name of the project.
  // When present it must be between 4 to 30 characters.
  // Allowed characters are: lowercase and uppercase letters, numbers,
  // hyphen, single-quote, double-quote, space, and exclamation point.
  //
  // Example: `My Project`
  string display_name = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 30
  ];

  // Output only. Creation time.
  google.protobuf.Timestamp create_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The most recent time this resource was modified.
  google.protobuf.Timestamp update_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The time at which this resource was requested for deletion.
  google.protobuf.Timestamp delete_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The time at which this project will be purged.
  // Approximately 30 days after deletion.
  google.protobuf.Timestamp purge_time = 12 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A checksum computed by the server based on the current value
  // of the Project resource. This may be sent on update and delete requests to
  // ensure the client has an up-to-date value before proceeding.
  string etag = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. The labels associated with this project.
  //
  // Label keys must be between 1 and 63 characters long and must conform
  // to the following regular expression: \[a-z\](\[-a-z0-9\]*\[a-z0-9\])?.
  //
  // Label values must be between 0 and 63 characters long and must conform
  // to the regular expression (\[a-z\](\[-a-z0-9\]*\[a-z0-9\])?)?.
  //
  // No more than 64 labels can be associated with a given resource.
  //
  // Clients should store labels in a representation such as JSON that does not
  // depend on specific characters being disallowed.
  //
  // Example: `"myBusinessDimension" : "businessValue"`
  map<string, string> labels = 10 [(google.api.field_behavior) = OPTIONAL];
}

// The request sent to the
// [GetProject][pivox.api.v1.Projects.GetProject]
// method.
message GetProjectRequest {
  // Required. The name of the project (for example,
  // `organizations/123/projects/my-project`).
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/Project"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// The request sent to the
// [ListProjects][pivox.api.v1.Projects.ListProjects]
// method.
message ListProjectsRequest {
  // Required. The name of the parent resource whose projects are being listed.
  // Only children of this parent resource are listed; descendants are not
  // listed.
  //
  // Use the value `organizations/{org_id}`.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/Project"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. A pagination token returned from a previous call to
  // [ListProjects] [pivox.api.v1.Projects.ListProjects] that
  // indicates from where listing should continue.
  string page_token = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The maximum number of projects to return in the response.
  // The server can return fewer projects than requested.
  // If unspecified, server picks an appropriate default.
  int32 page_size = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. Indicate that projects in the `DELETE_REQUESTED` state should
  // also be returned. Normally only `ACTIVE` projects are returned.
  bool show_deleted = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. An expression for filtering the results of the request.
  // Filter rules are case insensitive. Some eligible fields for filtering are:
  //
  // + `displayName`
  // + `state`
  // + `labels` (supports key and key=value matching)
  // + `createTime` (supports comparison operators)
  //
  // Some examples of filter strings:
  //
  // + `displayName = "My Project"` - returns projects with display name
  //   "My Project".
  // + `displayName = "My*"` - returns projects whose display name starts
  //   with "My".
  // + `state = ACTIVE` - returns only active projects.
  // + `labels.color:*` - returns projects that have the label "color".
  // + `labels.color = red` - returns projects where label "color" is "red".
  // + `createTime > "2024-01-01T00:00:00Z"` - returns projects created
  //   after the given timestamp.
  //
  // For more information, see [AIP-160](https://aip.dev/160).
  string filter = 5 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A comma-separated list of fields to order by. The default
  // order is ascending. Use "desc" after a field name for descending.
  // Supported fields:
  //
  // + `displayName`
  // + `createTime`
  // + `name`
  //
  // Example: `createTime desc, displayName`
  //
  // If not specified, the results are ordered by `name` ascending.
  string order_by = 6 [(google.api.field_behavior) = OPTIONAL];
}

// A page of the response received from the
// [ListProjects][pivox.api.v1.Projects.ListProjects]
// method.
//
// A paginated response where more pages are available has
// `next_page_token` set. This token can be used in a subsequent request to
// retrieve the next request page.
//
// NOTE: A response may contain fewer elements than the request `page_size` and
// still have a `next_page_token`.
message ListProjectsResponse {
  // The list of Projects under the parent. This list can be paginated.
  repeated Project projects = 1;

  // Pagination token.
  //
  // If the result set is too large to fit in a single response, this token
  // is returned. It encodes the position of the current result cursor.
  // Feeding this value into a new list request with the `page_token` parameter
  // gives the next page of the results.
  //
  // When `next_page_token` is not filled in, there is no next page and
  // the list returned is the last page in the result set.
  //
  // Pagination tokens have a limited lifetime.
  string next_page_token = 2;
}

// The request sent to the
// [CreateProject][pivox.api.v1.Projects.CreateProject]
// method.
message CreateProjectRequest {
  // Required. The parent organization for the project.
  // Must be of the form `organizations/{org_id}`.
  string parent = 4 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/Project"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Required. The Project to create.
  //
  // Project ID is required. If the requested ID is unavailable, the request
  // fails.
  Project project = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. A unique identifier for the project. If not provided, the server will
  // generate one.
  string project_id = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 3 [(google.api.field_behavior) = OPTIONAL];
}

// The request sent to the
// [UpdateProject][pivox.api.v1.Projects.UpdateProject]
// method.
//
// Only the `display_name` and `labels` fields can be changed.
message UpdateProjectRequest {
  // Required. The new definition of the project.
  Project project = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. An update mask to selectively update fields.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, and the project is not found, a new project will be created.
  // In this situation, update_mask is ignored.
  bool allow_missing = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// [DeleteProject][pivox.api.v1.Projects.DeleteProject]
// method.
message DeleteProjectRequest {
  // Required. The name of the Project (for example,
  // `organizations/123/projects/my-project`).
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/Project"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. The etag known to the client for the expected state of the project.
  // This is to be used for optimistic concurrency.
  string etag = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 3 [(google.api.field_behavior) = OPTIONAL];
}

// The request sent to the [UndeleteProject]
// [pivox.api.v1.Projects.UndeleteProject]
// method.
message UndeleteProjectRequest {
  // Required. The name of the project (for example,
  // `organizations/123/projects/my-project`).
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/Project"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. The etag known to the client for the expected state of the project.
  // This is to be used for optimistic concurrency.
  string etag = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 3 [(google.api.field_behavior) = OPTIONAL];
}

// A status object which is used as the `metadata` field for the Operation
// returned by CreateProject.
message CreateProjectMetadata {}

// A status object which is used as the `metadata` field for the Operation
// returned by UpdateProject.
message UpdateProjectMetadata {}

// A status object which is used as the `metadata` field for the Operation
// returned by DeleteProject.
message DeleteProjectMetadata {}

// A status object which is used as the `metadata` field for the Operation
// returned by UndeleteProject.
message UndeleteProjectMetadata {}
