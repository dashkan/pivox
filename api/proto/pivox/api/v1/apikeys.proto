syntax = "proto3";

package pivox.api.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "pivox/api/v1;apiv1";

// Manages the API keys associated with organizations.
service ApiKeys {
  option (google.api.default_host) = "api.pivox.io";

  // Creates a new API key.
  rpc CreateKey(CreateKeyRequest) returns (Key) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*}/keys"
      body: "key"
    };
    option (google.api.method_signature) = "parent,key,key_id";
  }

  // Lists the API keys owned by an organization. The key string of the API
  // key isn't included in the response.
  rpc ListKeys(ListKeysRequest) returns (ListKeysResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*}/keys"};
    option (google.api.method_signature) = "parent";
  }

  // Gets the metadata for an API key. The key string of the API key
  // isn't included in the response.
  rpc GetKey(GetKeyRequest) returns (Key) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/keys/*}"};
    option (google.api.method_signature) = "name";
  }

  // Get the key string for an API key.
  // (-- api-linter: core::0131::response-message-name=disabled
  //     aip.dev/not-precedent: This is a custom method returning a secret value, not a resource Get. --)
  rpc GetKeyString(GetKeyStringRequest) returns (GetKeyStringResponse) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/keys/*}/keyString"};
    option (google.api.method_signature) = "name";
  }

  // Patches the modifiable fields of an API key.
  // The key string of the API key isn't included in the response.
  rpc UpdateKey(UpdateKeyRequest) returns (Key) {
    option (google.api.http) = {
      patch: "/v1/{key.name=organizations/*/keys/*}"
      body: "key"
    };
    option (google.api.method_signature) = "key,update_mask";
  }

  // Deletes an API key. Deleted key can be retrieved within 30 days of
  // deletion. Afterward, key will be purged from the organization.
  rpc DeleteKey(DeleteKeyRequest) returns (Key) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/keys/*}"};
    option (google.api.method_signature) = "name";
  }

  // Undeletes an API key which was deleted within 30 days.
  rpc UndeleteKey(UndeleteKeyRequest) returns (Key) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/keys/*}:undelete"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Find the parent organization and resource name of the API
  // key that matches the key string in the request. If the API key has been
  // purged, resource name will not be set.
  // The service account must have the `apikeys.keys.lookup` permission
  // on the parent organization.
  // (-- api-linter: core::0131::synonyms=disabled
  //     aip.dev/not-precedent: LookupKey searches by key string, not by resource name. --)
  rpc LookupKey(LookupKeyRequest) returns (LookupKeyResponse) {
    option (google.api.http) = {get: "/v1/keys:lookupKey"};
  }
}

// The representation of a key managed by the API Keys API.
message Key {
  option (google.api.resource) = {
    type: "pivox.api/Key"
    pattern: "organizations/{organization}/keys/{key}"
    plural: "keys"
    singular: "key"
  };

  // Output only. The resource name of the key.
  // The `name` has the form:
  // `organizations/{organization}/keys/{key}`.
  // For example:
  // `organizations/123/keys/my-api-key`.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Optional. Human-readable display name of this key that you can modify.
  // The maximum length is 63 characters.
  string display_name = 2 [(google.api.field_behavior) = OPTIONAL];

  // Output only. An encrypted and signed value held by this key.
  // This field can be accessed only through the `GetKeyString` method.
  string key_string = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A timestamp identifying the time this key was originally
  // created.
  google.protobuf.Timestamp create_time = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A timestamp identifying the time this key was last
  // updated.
  google.protobuf.Timestamp update_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A timestamp when this key was deleted. If the resource is not
  // deleted, this must be empty.
  google.protobuf.Timestamp delete_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The time at which this key will be purged.
  // Approximately 30 days after deletion.
  google.protobuf.Timestamp purge_time = 12 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Annotations is an unstructured key-value map stored with a policy that
  // may be set by external tools to store and retrieve arbitrary metadata.
  // They are not queryable and should be preserved when modifying objects.
  map<string, string> annotations = 8 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Key restrictions.
  Restrictions restrictions = 9 [(google.api.field_behavior) = OPTIONAL];

  // Output only. A checksum computed by the server based on the current value
  // of the Key resource. This may be sent on update and delete requests to
  // ensure the client has an up-to-date value before proceeding.
  string etag = 11 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Describes the restrictions on the key.
message Restrictions {
  // The websites, IP addresses, Android apps, or iOS apps (the clients) that
  // are allowed to use the key. You can specify only one type of client
  // restrictions per key.
  oneof client_restrictions {
    // The HTTP referrers (websites) that are allowed to use the key.
    BrowserKeyRestrictions browser_key_restrictions = 1;

    // The IP addresses of callers that are allowed to use the key.
    ServerKeyRestrictions server_key_restrictions = 2;

    // The Android apps that are allowed to use the key.
    AndroidKeyRestrictions android_key_restrictions = 3;

    // The iOS apps that are allowed to use the key.
    IosKeyRestrictions ios_key_restrictions = 4;
  }

  // Optional. A restriction for a specific service and optionally one or
  // more specific methods. Requests are allowed if they
  // match any of these restrictions. If no restrictions are
  // specified, all targets are allowed.
  repeated ApiTarget api_targets = 5 [(google.api.field_behavior) = OPTIONAL];
}

// The HTTP referrers (websites) that are allowed to use the key.
message BrowserKeyRestrictions {
  // Optional. A list of regular expressions for the referrer URLs that are allowed
  // to make API calls with this key.
  repeated string allowed_referrers = 1 [(google.api.field_behavior) = OPTIONAL];
}

// The IP addresses of callers that are allowed to use the key.
message ServerKeyRestrictions {
  // Optional. A list of the caller IP addresses that are allowed to make API calls
  // with this key.
  repeated string allowed_ips = 1 [(google.api.field_behavior) = OPTIONAL];
}

// The Android apps that are allowed to use the key.
message AndroidKeyRestrictions {
  // Optional. A list of Android applications that are allowed to make API calls with
  // this key.
  repeated AndroidApplication allowed_applications = 1 [(google.api.field_behavior) = OPTIONAL];
}

// Identifier of an Android application for key use.
message AndroidApplication {
  // Optional. The SHA1 fingerprint of the application. For example, both sha1 formats are
  // acceptable : DA:39:A3:EE:5E:6B:4B:0D:32:55:BF:EF:95:60:18:90:AF:D8:07:09 or
  // DA39A3EE5E6B4B0D3255BFEF95601890AFD80709.
  // Output format is the latter.
  string sha1_fingerprint = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The package of the application.
  // (-- api-linter: core::0140::reserved-words=disabled
  //     aip.dev/not-precedent: "package" is the standard term for Android application identifiers. --)
  string package = 2 [(google.api.field_behavior) = OPTIONAL];
}

// The iOS apps that are allowed to use the key.
message IosKeyRestrictions {
  // Optional. A list of bundle IDs that are allowed when making API calls with this key.
  repeated string allowed_bundle_ids = 1 [(google.api.field_behavior) = OPTIONAL];
}

// A restriction for a specific service and optionally one or multiple
// specific methods. Both fields are case insensitive.
message ApiTarget {
  // Optional. The service for this restriction. It should be the canonical
  // service name, for example: `translate.pivox.api`.
  string service = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional. List of one or more methods that can be called.
  // If empty, all methods for the service are allowed. A wildcard
  // (*) can be used as the last symbol.
  // Valid examples:
  //   `pivox.translate.v2.TranslateService.GetSupportedLanguage`
  //   `TranslateText`
  //   `Get*`
  //   `translate.pivox.api.Get*`
  repeated string methods = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for `CreateKey` method.
message CreateKeyRequest {
  // Required. The organization in which the API key is created.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/Key"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Required. The API key fields to set at creation time.
  // You can configure only the `display_name`, `restrictions`, and
  // `annotations` fields.
  Key key = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // User specified key id (optional). If specified, it will become the final
  // component of the key resource name.
  //
  // The id must be unique within the project, must conform with RFC-1034,
  // is restricted to lower-cased letters, and has a maximum length of 63
  // characters. In another word, the id must match the regular
  // expression: `[a-z]([a-z0-9-]{0,61}[a-z0-9])?`.
  //
  // The id must NOT be a UUID-like string.
  string key_id = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string = {
      max_len: 63
      pattern: "^$|^[a-z]([a-z0-9-]{0,61}[a-z0-9])?$"
    }
  ];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for `ListKeys` method.
message ListKeysRequest {
  // Required. Lists all API keys associated with this organization.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/Key"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. Specifies the maximum number of results to be returned at a time.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. Requests a specific page of results.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Indicate that keys deleted in the past 30 days should also be
  // returned.
  bool show_deleted = 6 [(google.api.field_behavior) = OPTIONAL];

  // Optional. An expression for filtering the results of the request.
  string filter = 7 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Specify how the results should be sorted.
  string order_by = 8 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for `ListKeys` method.
message ListKeysResponse {
  // A list of API keys.
  repeated Key keys = 1;

  // The pagination token for the next page of results.
  string next_page_token = 2;
}

// Request message for `GetKey` method.
message GetKeyRequest {
  // Required. The resource name of the API key to get.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/Key"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// Request message for `GetKeyString` method.
message GetKeyStringRequest {
  // Required. The resource name of the API key to be retrieved.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/Key"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// Response message for `GetKeyString` method.
message GetKeyStringResponse {
  // An encrypted and signed value of the key.
  string key_string = 1;
}

// Request message for `UpdateKey` method.
message UpdateKeyRequest {
  // Required. Set the `name` field to the resource name of the API key to be
  // updated. You can update only the `display_name`, `restrictions`, and
  // `annotations` fields.
  Key key = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. The field mask specifies which fields to be updated as part of this
  // request. All other fields are ignored.
  // Mutable fields are: `display_name`, `restrictions`, and `annotations`.
  // If an update mask is not provided, the service treats it as an implied mask
  // equivalent to all allowed fields that are set on the wire. If the field
  // mask has a special value "*", the service treats it equivalent to replace
  // all allowed mutable fields.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for `DeleteKey` method.
message DeleteKeyRequest {
  // Required. The resource name of the API key to be deleted.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/Key"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. The etag known to the client for the expected state of the key.
  // This is to be used for optimistic concurrency.
  string etag = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for `UndeleteKey` method.
message UndeleteKeyRequest {
  // Required. The resource name of the API key to be undeleted.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/Key"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// Request message for `LookupKey` method.
message LookupKeyRequest {
  // Required. Finds the organization that owns the key string value.
  string key_string = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// Response message for `LookupKey` method.
message LookupKeyResponse {
  // The organization that owns the key with the value specified in the request.
  string parent = 1;

  // The resource name of the API key. If the API key has been purged,
  // resource name is empty.
  string name = 2;
}
