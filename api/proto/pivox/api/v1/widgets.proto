syntax = "proto3";

package pivox.api.v1;

import "buf/validate/validate.proto";
import "google/api/field_behavior.proto";
import "pivox/api/v1/data_sources.proto";

option go_package = "pivox/api/v1;apiv1";

// GridLayout positions tiles on a column-based grid. Maps to react-grid-layout.
message GridLayout {
  // Optional. The number of columns in the grid. Defaults to 12 if unset.
  int32 columns = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 24
    }
  ];

  // Optional. The tiles arranged on the grid.
  repeated Tile tiles = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Tile represents a positioned widget within a GridLayout.
message Tile {
  // Required. The zero-indexed column position of the tile.
  int32 x_pos = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).int32.gte = 0
  ];

  // Required. The zero-indexed row position of the tile.
  int32 y_pos = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).int32.gte = 0
  ];

  // Required. The width of the tile in columns. Must be at least 1.
  int32 width = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).int32.gte = 1
  ];

  // Required. The height of the tile in rows. Must be at least 1.
  int32 height = 4 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).int32.gte = 1
  ];

  // Required. The widget displayed in this tile.
  Widget widget = 5 [(google.api.field_behavior) = REQUIRED];
}

// Widget contains a single dashboard component.
message Widget {
  // Optional. Client-assigned identifier for the widget.
  string id = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The display title of the widget.
  string title = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 256
  ];

  // The widget content. Extensible — new widget types can be added as
  // additional oneof fields.
  oneof content {
    // A single KPI / statistic value.
    StatisticWidget statistic = 3;

    // An XY chart (line, bar, area, etc.).
    ChartWidget chart = 4;

    // A data table.
    TableWidget table = 5;

    // A pie or donut chart.
    PieChartWidget pie_chart = 6;

    // Rich text or markdown content.
    TextWidget text = 7;

    // A visual section separator.
    SectionHeader section_header = 8;
  }
}

// StatisticWidget displays a single KPI value with optional sparkline.
message StatisticWidget {
  // Required. The data source for the statistic value.
  DataSource data_source = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. The unit label (e.g. "requests/sec", "%").
  string unit = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Thresholds for color-coding the value.
  repeated Threshold thresholds = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Whether to show a sparkline trend below the value.
  bool sparkline = 4 [(google.api.field_behavior) = OPTIONAL];
}

// ChartWidget displays time series or categorical data as an XY chart.
message ChartWidget {
  // Chart visualization types.
  enum ChartType {
    // Unspecified chart type; defaults to LINE.
    CHART_TYPE_UNSPECIFIED = 0;

    // Line chart.
    LINE = 1;

    // Bar chart.
    BAR = 2;

    // Area chart.
    AREA = 3;

    // Stacked bar chart.
    STACKED_BAR = 4;

    // Stacked area chart.
    STACKED_AREA = 5;

    // Scatter plot.
    SCATTER = 6;
  }

  // Required. The data sets to plot. Each data set becomes a series.
  repeated ChartDataSet data_sets = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).repeated.min_items = 1
  ];

  // Optional. The chart visualization type.
  ChartType chart_type = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. X-axis configuration.
  AxisConfig x_axis = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Y-axis configuration.
  AxisConfig y_axis = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Threshold lines drawn on the chart.
  repeated Threshold thresholds = 5 [(google.api.field_behavior) = OPTIONAL];
}

// TableWidget displays data in a tabular format.
message TableWidget {
  // Required. The data source for table rows.
  DataSource data_source = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. Column definitions. If empty, columns are auto-detected.
  repeated TableColumn columns = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Number of rows per page. Defaults to server-chosen value.
  int32 rows_per_page = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32.gte = 0
  ];
}

// PieChartWidget displays data as a pie or donut chart.
message PieChartWidget {
  // Pie chart visualization types.
  enum PieChartType {
    // Unspecified; defaults to PIE.
    PIE_CHART_TYPE_UNSPECIFIED = 0;

    // Standard pie chart.
    PIE = 1;

    // Donut chart.
    DONUT = 2;
  }

  // Required. The data source for the chart segments.
  DataSource data_source = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. The pie chart visualization type.
  PieChartType pie_chart_type = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Whether to display labels on segments.
  bool show_labels = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Whether to display a legend.
  bool show_legend = 4 [(google.api.field_behavior) = OPTIONAL];
}

// TextWidget displays rich text or markdown content.
message TextWidget {
  // Text format types.
  enum Format {
    // Unspecified; defaults to MARKDOWN.
    FORMAT_UNSPECIFIED = 0;

    // Markdown-formatted text.
    MARKDOWN = 1;

    // Plain text.
    PLAIN_TEXT = 2;
  }

  // Required. The text content.
  string content = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];

  // Optional. The text format.
  Format format = 2 [(google.api.field_behavior) = OPTIONAL];
}

// SectionHeader is a visual separator for organizing dashboard sections.
message SectionHeader {
  // Optional. A subtitle displayed below the widget title.
  string subtitle = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Whether to render a divider line below the header.
  bool divider_below = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Threshold defines a value boundary for color-coding or reference lines.
message Threshold {
  // Direction relative to the threshold value.
  enum Direction {
    // Unspecified direction.
    DIRECTION_UNSPECIFIED = 0;

    // Values above the threshold.
    ABOVE = 1;

    // Values below the threshold.
    BELOW = 2;
  }

  // Required. The threshold value.
  double value = 1 [(google.api.field_behavior) = REQUIRED];

  // Optional. The color to use when the threshold is triggered (CSS color).
  string color = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The direction relative to the threshold value.
  Direction direction = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A human-readable label for the threshold.
  string label = 4 [(google.api.field_behavior) = OPTIONAL];
}

// ChartDataSet is a single data series within a ChartWidget.
message ChartDataSet {
  // Required. The data source for this series.
  DataSource data_source = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. The display label for this series.
  string label = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The color for this series (CSS color).
  string color = 3 [(google.api.field_behavior) = OPTIONAL];
}

// AxisConfig defines display properties for a chart axis.
message AxisConfig {
  // Axis scale types.
  enum Scale {
    // Unspecified; defaults to LINEAR.
    SCALE_UNSPECIFIED = 0;

    // Linear scale.
    LINEAR = 1;

    // Logarithmic (base 10) scale.
    LOG10 = 2;
  }

  // Optional. The axis label.
  string label = 1 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The axis scale.
  Scale scale = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The minimum axis value.
  double min = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The maximum axis value.
  double max = 4 [(google.api.field_behavior) = OPTIONAL];
}

// TableColumn defines a column in a TableWidget.
message TableColumn {
  // Required. The field name from the data source.
  string field = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];

  // Optional. The display name for the column header.
  string display_name = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Whether this column is visible. Defaults to true.
  bool visible = 3 [(google.api.field_behavior) = OPTIONAL];
}
