// An invitation to join an organization. Invitations are created by org
// admins and sent to users by email. The recipient can accept or decline.
message Invitation {
  option (google.api.resource) = {
    type: "pivox.api/Invitation"
    pattern: "organizations/{organization}/invitations/{invitation}"
    plural: "invitations"
    singular: "invitation"
  };

  // Invitation lifecycle states.
  enum State {
    // Unspecified state.
    STATE_UNSPECIFIED = 0;

    // The invitation is pending acceptance.
    PENDING = 1;

    // The invitation has been accepted and a user membership was created.
    ACCEPTED = 2;

    // The invitation was declined by the recipient.
    DECLINED = 3;

    // The invitation was revoked by an org admin.
    REVOKED = 4;

    // The invitation expired before being accepted or declined.
    EXPIRED = 5;
  }

  // Output only. The resource name of the invitation.
  // Format: `organizations/{organization}/invitations/{invitation}`
