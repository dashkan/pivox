option go_package = "pivox/api/v1;apiv1";

// Allows users to manage their organization resources.
service Organizations {
  option (google.api.default_host) = "api.pivox.io";

  // Fetches an organization resource identified by the specified resource name.
  rpc GetOrganization(GetOrganizationRequest) returns (Organization) {
    option (google.api.http) = {get: "/v1/{name=organizations/*}"};
    option (google.api.method_signature) = "name";
  }

  // Lists organization resources that are visible to the user and satisfy
  // the specified filter.
  //
  // This will only return organizations on which the user has the permission
  // `resourcemanager.organizations.get`
  rpc ListOrganizations(ListOrganizationsRequest) returns (ListOrganizationsResponse) {
    option (google.api.http) = {get: "/v1/organizations"};
  }

  // Creates a new organization resource.
  //
  // The caller must have `resourcemanager.organizations.create` permission.
  rpc CreateOrganization(CreateOrganizationRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/organizations"
      body: "organization"
    };
    option (google.api.method_signature) = "organization,organization_id";
    option (google.longrunning.operation_info) = {
      response_type: "Organization"
      metadata_type: "CreateOrganizationMetadata"
    };
  }

  // Updates an organization resource. Only the `display_name` and
  // `annotations` fields can be updated. Use the field mask to specify which
  // fields to update. Omitting the field mask updates all mutable fields.
  //
  // The caller must have `resourcemanager.organizations.update` permission
  // on the specified organization.
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1/{organization.name=organizations/*}"
      body: "organization"
    };
    option (google.api.method_signature) = "organization,update_mask";
    option (google.api.method_signature) = "organization";
    option (google.longrunning.operation_info) = {
      response_type: "Organization"
      metadata_type: "UpdateOrganizationMetadata"
    };
  }

  // Gets the access control policy for an organization resource. The policy may
  // be empty if no such policy or resource exists. The `resource` field should
  // be the organization's resource name, for example: "organizations/123".
  //
  // Authorization requires the IAM permission
  // `resourcemanager.organizations.getIamPolicy` on the specified organization.
  rpc GetIamPolicy(pivox.iam.v1.GetIamPolicyRequest) returns (pivox.iam.v1.Policy) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*}:getIamPolicy"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Sets the access control policy on an organization resource. Replaces any
  // existing policy. The `resource` field should be the organization's resource
  // name, for example: "organizations/123".
  //
  // Authorization requires the IAM permission
  // `resourcemanager.organizations.setIamPolicy` on the specified organization.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: SetIamPolicy returns Policy per IAM convention. --)
  rpc SetIamPolicy(pivox.iam.v1.SetIamPolicyRequest) returns (pivox.iam.v1.Policy) {
    option (google.api.http) = {
      post: "/v1/{resource=organizations/*}:setIamPolicy"
      body: "*"
    };
    option (google.api.method_signature) = "resource,policy";
  }

  // Returns the permissions that a caller has on the specified organization.
  // The `resource` field should be the organization's resource name,
  // for example: "organizations/123".
  //
  // There are no permissions required for making this API call.
  rpc TestIamPermissions(pivox.iam.v1.TestIamPermissionsRequest) returns (pivox.iam.v1.TestIamPermissionsResponse) {
    option (google.api.http) = {
      post: "/v1/{resource=organizations/*}:testIamPermissions"
      body: "*"
    };
    option (google.api.method_signature) = "resource,permissions";
  }

  // Creates an invitation to join the organization.
  //
  // The server validates the email against the organization's invitation
  // policy before creating the invitation.
  rpc CreateInvitation(CreateInvitationRequest) returns (Invitation) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*}/invitations"
      body: "invitation"
    };
    option (google.api.method_signature) = "parent,invitation,invitation_id";
  }

  // Lists invitations for the organization.
  rpc ListInvitations(ListInvitationsRequest) returns (ListInvitationsResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*}/invitations"};
    option (google.api.method_signature) = "parent";
  }

  // Gets an invitation by resource name.
  rpc GetInvitation(GetInvitationRequest) returns (Invitation) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/invitations/*}"};
    option (google.api.method_signature) = "name";
  }

  // Accepts a pending invitation. The caller must be authenticated and
  // their email must match the invitation's email. On success, a user
  // membership is created in the organization and the specified role is
  // assigned.
  rpc AcceptInvitation(AcceptInvitationRequest) returns (AcceptInvitationResponse) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/invitations/*}:accept"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Declines a pending invitation. The caller must be authenticated and
  // their email must match the invitation's email.
  rpc DeclineInvitation(DeclineInvitationRequest) returns (DeclineInvitationResponse) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/invitations/*}:decline"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Revokes a pending invitation. Only org admins can revoke invitations.
  rpc DeleteInvitation(DeleteInvitationRequest) returns (Invitation) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/invitations/*}"};
    option (google.api.method_signature) = "name";
  }

  // Gets the invitation policy for an organization.
  rpc GetInvitationPolicy(GetInvitationPolicyRequest) returns (InvitationPolicy) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/invitationPolicy}"};
    option (google.api.method_signature) = "name";
  }

  // Updates the invitation policy for an organization.
  // (-- api-linter: core::0134::response-message-name=disabled
  //     aip.dev/not-precedent: UpdateInvitationPolicy is a singleton sub-resource update. --)
  rpc UpdateInvitationPolicy(UpdateInvitationPolicyRequest) returns (InvitationPolicy) {
    option (google.api.http) = {
      patch: "/v1/{invitation_policy.name=organizations/*/invitationPolicy}"
      body: "invitation_policy"
    };
    option (google.api.method_signature) = "invitation_policy,update_mask";
  }

  // Retrieves a custom domain associated with an organization.
  rpc GetCustomDomain(GetCustomDomainRequest) returns (CustomDomain) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/customDomains/*}"};
    option (google.api.method_signature) = "name";
  }

  // Lists custom domains associated with an organization.
  rpc ListCustomDomains(ListCustomDomainsRequest) returns (ListCustomDomainsResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*}/customDomains"};
    option (google.api.method_signature) = "parent";
  }

  // Creates a custom domain for an organization. Once created, the domain
  // enters the `PENDING` state and the response includes the DNS records
  // that the domain owner must configure. After DNS verification succeeds,
  // the server automatically provisions a TLS certificate and transitions
  // the domain to `ACTIVE`.
  //
  // The caller must have `resourcemanager.customDomains.create` permission
  // on the parent organization.
  rpc CreateCustomDomain(CreateCustomDomainRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*}/customDomains"
      body: "custom_domain"
    };
    option (google.api.method_signature) = "parent,custom_domain,custom_domain_id";
    option (google.longrunning.operation_info) = {
      response_type: "CustomDomain"
      metadata_type: "CreateCustomDomainMetadata"
    };
  }

  // Deletes a custom domain from an organization, including TLS certificate
  // revocation and routing removal.
  //
  // The caller must have `resourcemanager.customDomains.delete` permission
  // on the parent organization.
  rpc DeleteCustomDomain(DeleteCustomDomainRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/customDomains/*}"};
    option (google.api.method_signature) = "name";
    option (google.longrunning.operation_info) = {
      response_type: "CustomDomain"
      metadata_type: "DeleteCustomDomainMetadata"
    };
  }
}

// The root node in the resource hierarchy to which a particular entity's
// (a company, for example) resources belong.
message Organization {
  option (google.api.resource) = {
    type: "pivox.api/Organization"
    pattern: "organizations/{organization}"
    plural: "organizations"
    singular: "organization"
  };

  // Organization lifecycle states.
  enum State {
    // Unspecified state.  This is only useful for distinguishing unset values.
    STATE_UNSPECIFIED = 0;

    // The normal and active state.
    ACTIVE = 1;

    // The organization has been marked for deletion by the user.
    DELETE_REQUESTED = 2;
  }

  // Output only. The resource name of the organization. This is the
  // organization's relative path in the API. Its format is
  // "organizations/[organization_id]". For example, "organizations/1234".
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Output only. A human-readable string that refers to the organization in the
  // Pivox Console. This string is set by the server and cannot be
  // changed. The string will be set to the primary domain (for example,
  // "acme.com") of the customer that owns the organization.
  string display_name = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The organization's current lifecycle state.
  State state = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the Organization was created.
  google.protobuf.Timestamp create_time = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the Organization was last modified.
  google.protobuf.Timestamp update_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the Organization was requested for deletion.
  google.protobuf.Timestamp delete_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The time at which this organization will be purged.
  // Approximately 30 days after deletion.
  google.protobuf.Timestamp purge_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A checksum computed by the server based on the current value
  // of the Organization resource. This may be sent on update and delete
  // requests to ensure the client has an up-to-date value before proceeding.
  string etag = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The resource name of the organization owner.
  // Format: `organizations/{organization}/users/{user}`
  string owner = 13 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {type: "pivox.iam/User"}
  ];

  // Optional. Labels associated with this organization.
  // Labels are key-value pairs that can be used to organize and track resources.
  map<string, string> annotations = 12 [(google.api.field_behavior) = OPTIONAL];
}

// The request sent to the `GetOrganization` method. The `name` field is
// required. `organization_id` is no longer accepted.
message GetOrganizationRequest {
  // Required. The resource name of the Organization to fetch. This is the
  // organization's relative path in the API, formatted as
  // "organizations/[organizationId]". For example, "organizations/1234".
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/Organization"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// The request sent to the `ListOrganizations` method.
message ListOrganizationsRequest {
  // Optional. The maximum number of organizations to return in the response.
  // The server can return fewer organizations than requested. If unspecified,
  // server picks an appropriate default.
  int32 page_size = 1 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A pagination token returned from a previous call to
  // `ListOrganizations` that indicates from where listing should continue.
  string page_token = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Controls whether organizations in the DELETE_REQUESTED state
  // should be returned. Defaults to false.
  bool show_deleted = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. An expression for filtering the results of the request.
  // Filter rules are case insensitive. Some eligible fields for filtering are:
  //
  // + `displayName`
  // + `directoryCustomerId`
  // + `state`
  // + `createTime`
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Specify how the results should be sorted.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// The request sent to the
// [CreateOrganization][pivox.api.v1.Organizations.CreateOrganization]
// method.
message CreateOrganizationRequest {
  // Required. The Organization to create.
  Organization organization = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. A unique identifier for the organization. If not provided, the
  // server will generate one. Must start with a letter, contain only lowercase
  // letters, digits, and hyphens, and be between 4 and 20 characters long.
  // This value is also used as the Firebase Auth tenant display name.
  string organization_id = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string = {pattern: "^[a-z][a-z0-9-]{3,19}$"}
  ];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 3 [(google.api.field_behavior) = OPTIONAL];
}

// The request sent to the
// [UpdateOrganization][pivox.api.v1.Organizations.UpdateOrganization]
// method.
//
// Only the `display_name` and `annotations` fields can be updated. Use the
// `update_mask` to selectively update specific fields.
message UpdateOrganizationRequest {
  // Required. The new definition of the organization. The `name` field must
  // be populated to identify the organization to update.
  Organization organization = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. An update mask to selectively update fields. If not provided,
  // all mutable fields will be updated. See
  // [FieldMask](https://protobuf.dev/reference/protobuf/google.protobuf/#field-mask)
  // for more details.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// The response returned from the `ListOrganizations` method.
message ListOrganizationsResponse {
  // The list of Organizations that matched the list request, possibly
  // paginated.
  repeated Organization organizations = 1;

  // A pagination token to be used to retrieve the next page of results. If the
  // result is too large to fit within the page size specified in the request,
  // this field will be set with a token that can be used to fetch the next page
  // of results. If this field is empty, it indicates that this response
  // contains the last page of results.
  string next_page_token = 2;
}

// A custom domain associated with an organization. Custom domains allow
// organizations to serve Pivox services under their own domain name
// (for example, `pivox.acme.com`). The server handles DNS verification
// and TLS certificate provisioning automatically.
message CustomDomain {
  option (google.api.resource) = {
    type: "pivox.api/CustomDomain"
    pattern: "organizations/{organization}/customDomains/{custom_domain}"
    plural: "customDomains"
    singular: "customDomain"
  };

  // The lifecycle state of a custom domain.
  enum State {
    // Unspecified state. This is only useful for distinguishing unset values.
    STATE_UNSPECIFIED = 0;

    // The domain has been created and is waiting for the owner to configure
    // the required DNS records.
    PENDING = 1;

    // The DNS records have been verified. The server is provisioning a TLS
    // certificate via the ACME protocol.
    PROVISIONING = 2;

    // The domain is fully verified, the TLS certificate has been issued, and
    // traffic is being served.
    ACTIVE = 3;

    // DNS verification or TLS certificate provisioning failed. Inspect the
    // `required_dns_records` to ensure records are configured correctly.
    FAILED = 4;

    // The domain was previously active but has been deactivated because DNS
    // records were removed or the TLS certificate could not be renewed.
    DEACTIVATED = 5;
  }

  // Output only. The resource name of the custom domain. Format:
  // `organizations/{organization}/customDomains/{custom_domain}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Immutable. The fully qualified domain name, for example
  // `pivox.acme.com`. Cannot be changed after creation — delete and
  // recreate the resource to use a different domain.
  string domain = 3 [
    (google.api.field_behavior) = IMMUTABLE,
    (buf.validate.field).cel = {
      id: "valid_domain"
      message: "must be a valid domain name"
      expression: "this.matches('^([a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?\\\\.)+[a-zA-Z]{2,}$')"
    }
  ];

  // Output only. The current lifecycle state of the custom domain.
  State state = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The DNS records that the domain owner must create to verify
  // ownership and route traffic. Typically includes a `TXT` record for
  // verification and a `CNAME` record for routing.
  repeated DnsRecord required_dns_records = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the custom domain was created.
  google.protobuf.Timestamp create_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the custom domain was last modified.
  google.protobuf.Timestamp update_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the custom domain was requested for deletion.
  google.protobuf.Timestamp delete_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when DNS verification was last confirmed.
  google.protobuf.Timestamp verify_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A checksum computed by the server based on the current value
  // of the CustomDomain resource. This may be sent on delete requests to
  // ensure the client has an up-to-date value before proceeding.
  string etag = 10 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// A DNS record that a domain owner must configure in their DNS provider
// to verify ownership or route traffic.
message DnsRecord {
  // The DNS record type, for example `CNAME`, `TXT`, or `A`.
  string type = 1 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The hostname to create the record on, for example
  // `_pivox.acme.com` or `pivox.acme.com`.
  string host = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // The value for the DNS record, for example
  // `pivox-verify=abc123` or `custom.pivox.io`.
  string value = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// The request sent to the
// [GetCustomDomain][pivox.api.v1.Organizations.GetCustomDomain]
// method.
message GetCustomDomainRequest {
  // Required. The resource name of the custom domain to retrieve. Format:
  // `organizations/{organization}/customDomains/{custom_domain}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/CustomDomain"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// The request sent to the
// [ListCustomDomains][pivox.api.v1.Organizations.ListCustomDomains]
// method.
message ListCustomDomainsRequest {
  // Required. The parent organization whose custom domains are being listed.
  // Format: `organizations/{organization}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/CustomDomain"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. The maximum number of custom domains to return in the response.
  // The server can return fewer custom domains than requested. If unspecified,
  // the server picks an appropriate default.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A pagination token returned from a previous call to
  // `ListCustomDomains` that indicates from where listing should continue.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// The response returned from the
// [ListCustomDomains][pivox.api.v1.Organizations.ListCustomDomains]
// method.
message ListCustomDomainsResponse {
  // The list of custom domains for the specified organization.
  repeated CustomDomain custom_domains = 1;

  // A pagination token to be used to retrieve the next page of results.
  // If empty, this response contains the last page of results.
  string next_page_token = 2;
}

// The request sent to the
// [CreateCustomDomain][pivox.api.v1.Organizations.CreateCustomDomain]
// method.
message CreateCustomDomainRequest {
  // Required. The parent organization where the custom domain will be created.
  // Format: `organizations/{organization}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/CustomDomain"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Required. The custom domain to create. The `domain` field must be set.
  CustomDomain custom_domain = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. A unique identifier for the custom domain. If not provided,
  // the server will generate one.
  string custom_domain_id = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// A status object which is used as the `metadata` field for the Operation
// returned by CreateCustomDomain.
message CreateCustomDomainMetadata {}

// The request sent to the
// [DeleteCustomDomain][pivox.api.v1.Organizations.DeleteCustomDomain]
// method.
message DeleteCustomDomainRequest {
  // Required. The resource name of the custom domain to delete. Format:
  // `organizations/{organization}/customDomains/{custom_domain}`
  string name = 1 [
