syntax = "proto3";

package pivox.api.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "pivox/api/v1/widgets.proto";

option go_package = "pivox/api/v1;apiv1";

// Manages custom dashboards within a project.
service Dashboards {
  option (google.api.default_host) = "api.pivox.io";

  // Lists dashboards in a project.
  rpc ListDashboards(ListDashboardsRequest) returns (ListDashboardsResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*/projects/*}/dashboards"};
    option (google.api.method_signature) = "parent";
  }

  // Retrieves a dashboard by name.
  rpc GetDashboard(GetDashboardRequest) returns (Dashboard) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/projects/*/dashboards/*}"};
    option (google.api.method_signature) = "name";
  }

  // Creates a new dashboard in a project.
  rpc CreateDashboard(CreateDashboardRequest) returns (Dashboard) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*/projects/*}/dashboards"
      body: "dashboard"
    };
    option (google.api.method_signature) = "parent,dashboard,dashboard_id";
  }

  // Updates an existing dashboard.
  rpc UpdateDashboard(UpdateDashboardRequest) returns (Dashboard) {
    option (google.api.http) = {
      patch: "/v1/{dashboard.name=organizations/*/projects/*/dashboards/*}"
      body: "dashboard"
    };
    option (google.api.method_signature) = "dashboard,update_mask";
  }

  // Deletes a dashboard.
  rpc DeleteDashboard(DeleteDashboardRequest) returns (Dashboard) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/projects/*/dashboards/*}"};
    option (google.api.method_signature) = "name";
  }
}

// A custom dashboard belonging to a project.
message Dashboard {
  option (google.api.resource) = {
    type: "pivox.api/Dashboard"
    pattern: "organizations/{organization}/projects/{project}/dashboards/{dashboard}"
    plural: "dashboards"
    singular: "dashboard"
  };

  // Immutable. The resource name of the dashboard.
  // Format: `organizations/{organization}/projects/{project}/dashboards/{dashboard}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. A human-readable name for the dashboard.
  string display_name = 3 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {
      min_len: 1
      max_len: 128
    }
  ];

  // Optional. A longer description of the dashboard's purpose.
  string description = 4 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 1024
  ];

  // The dashboard layout. Currently only grid layout is supported;
  // the oneof allows adding new layout types in the future.
  oneof layout {
    // A grid-based layout with positioned tiles.
    GridLayout grid_layout = 5;
  }

  // Optional. Template variables for parameterizing widget queries.
  repeated DashboardVariable variables = 6 [(google.api.field_behavior) = OPTIONAL];

  // Output only. Creation time.
  google.protobuf.Timestamp create_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Last update time.
  google.protobuf.Timestamp update_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Entity tag for optimistic concurrency control.
  string etag = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Free-form annotations for the dashboard.
  map<string, string> annotations = 10 [(google.api.field_behavior) = OPTIONAL];
}

// A template variable that can be referenced in widget queries.
message DashboardVariable {
  // Required. The variable key (used as a template parameter in queries).
  string key = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.min_len = 1
  ];

  // Optional. A human-readable label for the variable.
  string display_name = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The default value when no selection is made.
  string default_value = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A fixed set of allowed values. If empty, any value is accepted.
  repeated string allowed_values = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for ListDashboards.
message ListDashboardsRequest {
  // Required. The parent project.
  // Format: `organizations/{organization}/projects/{project}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/Dashboard"},
    (buf.validate.field).required = true
  ];

  // Optional. Maximum number of dashboards to return.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. Page token from a previous ListDashboards call.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. An AIP-160 filter expression.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Sort order (e.g. "display_name", "create_time desc").
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for ListDashboards.
message ListDashboardsResponse {
  // The dashboards in the project.
  repeated Dashboard dashboards = 1;

  // Token for the next page of results.
  string next_page_token = 2;
}

// Request message for GetDashboard.
message GetDashboardRequest {
  // Required. The dashboard resource name.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/Dashboard"},
    (buf.validate.field).required = true
  ];
}

// Request message for CreateDashboard.
message CreateDashboardRequest {
  // Required. The parent project.
  // Format: `organizations/{organization}/projects/{project}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/Dashboard"},
    (buf.validate.field).required = true
  ];

  // Required. The dashboard to create.
  Dashboard dashboard = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. A client-assigned dashboard ID. If not provided, the server
  // will generate one.
  string dashboard_id = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If true, validate the request without persisting it.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for UpdateDashboard.
message UpdateDashboardRequest {
  // Required. The dashboard with updated fields.
  Dashboard dashboard = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. The fields to update. If omitted, all mutable fields are updated.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If true and the dashboard does not exist, create it.
  // When set, update_mask is ignored.
  bool allow_missing = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If true, validate the request without persisting it.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for DeleteDashboard.
message DeleteDashboardRequest {
  // Required. The dashboard resource name.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/Dashboard"},
    (buf.validate.field).required = true
  ];

  // Optional. If true, validate the request without persisting it.
  bool validate_only = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The etag for optimistic concurrency control.
  string etag = 3 [(google.api.field_behavior) = OPTIONAL];
}
