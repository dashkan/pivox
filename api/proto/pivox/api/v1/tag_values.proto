syntax = "proto3";

package pivox.api.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "pivox/iam/v1/iam_policy.proto";
import "pivox/iam/v1/policy.proto";

option go_package = "pivox/api/v1;apiv1";

// Allow users to create and manage tag values.
service TagValues {
  option (google.api.default_host) = "api.pivox.io";

  // Lists all TagValues for a specific TagKey.
  rpc ListTagValues(ListTagValuesRequest) returns (ListTagValuesResponse) {
    option (google.api.http) = {
      get: "/v1/{parent=organizations/*/tagKeys/*}/tagValues"
      additional_bindings: {get: "/v1/{parent=organizations/*/projects/*/tagKeys/*}/tagValues"}
    };
    option (google.api.method_signature) = "parent";
  }

  // Retrieves a TagValue. This method will return `PERMISSION_DENIED` if the
  // value does not exist or the user does not have permission to view it.
  rpc GetTagValue(GetTagValueRequest) returns (TagValue) {
    option (google.api.http) = {
      get: "/v1/{name=organizations/*/tagKeys/*/tagValues/*}"
      additional_bindings: {get: "/v1/{name=organizations/*/projects/*/tagKeys/*/tagValues/*}"}
    };
    option (google.api.method_signature) = "name";
  }

  // Creates a TagValue as a child of the specified TagKey. If a another
  // request with the same parameters is sent while the original request is in
  // process the second request will receive an error. A maximum of 1000
  // TagValues can exist under a TagKey at any given time.
  rpc CreateTagValue(CreateTagValueRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*/tagKeys/*}/tagValues"
      body: "tag_value"
      additional_bindings: {
        post: "/v1/{parent=organizations/*/projects/*/tagKeys/*}/tagValues"
        body: "tag_value"
      }
    };
    option (google.api.method_signature) = "parent,tag_value,tag_value_id";
    option (google.longrunning.operation_info) = {
      response_type: "TagValue"
      metadata_type: "CreateTagValueMetadata"
    };
  }

  // Updates the attributes of the TagValue resource.
  rpc UpdateTagValue(UpdateTagValueRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1/{tag_value.name=organizations/*/tagKeys/*/tagValues/*}"
      body: "tag_value"
      additional_bindings: {
        patch: "/v1/{tag_value.name=organizations/*/projects/*/tagKeys/*/tagValues/*}"
        body: "tag_value"
      }
    };
    option (google.api.method_signature) = "tag_value,update_mask";
    option (google.longrunning.operation_info) = {
      response_type: "TagValue"
      metadata_type: "UpdateTagValueMetadata"
    };
  }

  // Deletes a TagValue. The TagValue cannot have any bindings when it is
  // deleted.
  rpc DeleteTagValue(DeleteTagValueRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      delete: "/v1/{name=organizations/*/tagKeys/*/tagValues/*}"
      additional_bindings: {delete: "/v1/{name=organizations/*/projects/*/tagKeys/*/tagValues/*}"}
    };
    option (google.api.method_signature) = "name";
    option (google.longrunning.operation_info) = {
      response_type: "TagValue"
      metadata_type: "DeleteTagValueMetadata"
    };
  }

  // Gets the access control policy for a TagValue. The returned policy may be
  // empty if no such policy or resource exists. The `resource` field should
  // be the TagValue's resource name.
  // The caller must have the
  // `pivox.api/tagValues.getIamPolicy` permission on
  // the identified TagValue to get the access control policy.
  rpc GetIamPolicy(pivox.iam.v1.GetIamPolicyRequest) returns (pivox.iam.v1.Policy) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/tagKeys/*/tagValues/*}:getIamPolicy"
      body: "*"
      additional_bindings: {
        post: "/v1/{name=organizations/*/projects/*/tagKeys/*/tagValues/*}:getIamPolicy"
        body: "*"
      }
    };
    option (google.api.method_signature) = "name";
  }

  // Sets the access control policy on a TagValue, replacing any existing
  // policy. The `resource` field should be the TagValue's resource name.
  // The caller must have `resourcemanager.tagValues.setIamPolicy` permission
  // on the identified tagValue.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: SetIamPolicy returns Policy per IAM convention. --)
  rpc SetIamPolicy(pivox.iam.v1.SetIamPolicyRequest) returns (pivox.iam.v1.Policy) {
    option (google.api.http) = {
      post: "/v1/{resource=organizations/*/tagKeys/*/tagValues/*}:setIamPolicy"
      body: "*"
      additional_bindings: {
        post: "/v1/{resource=organizations/*/projects/*/tagKeys/*/tagValues/*}:setIamPolicy"
        body: "*"
      }
    };
    option (google.api.method_signature) = "resource,policy";
  }

  // Returns permissions that a caller has on the specified TagValue.
  // The `resource` field should be the TagValue's resource name.
  //
  // There are no permissions required for making this API call.
  rpc TestIamPermissions(pivox.iam.v1.TestIamPermissionsRequest) returns (pivox.iam.v1.TestIamPermissionsResponse) {
    option (google.api.http) = {
      post: "/v1/{resource=organizations/*/tagKeys/*/tagValues/*}:testIamPermissions"
      body: "*"
      additional_bindings: {
        post: "/v1/{resource=organizations/*/projects/*/tagKeys/*/tagValues/*}:testIamPermissions"
        body: "*"
      }
    };
    option (google.api.method_signature) = "resource,permissions";
  }
}

// A TagValue is a child of a particular TagKey. This is used to group
// resources for the purpose of controlling them using policies.
message TagValue {
  option (google.api.resource) = {
    type: "pivox.api/TagValue"
    pattern: "organizations/{organization}/tagKeys/{tag_key}/tagValues/{tag_value}"
    pattern: "organizations/{organization}/projects/{project}/tagKeys/{tag_key}/tagValues/{tag_value}"
    plural: "tagValues"
    singular: "tagValue"
  };

  // Immutable. Resource name for TagValue in the format
  // `organizations/{organization}/tagKeys/{tag_key}/tagValues/{tag_value}`.
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Optional. User-assigned description of the TagValue.
  // Must not exceed 256 characters.
  //
  // Read-write.
  string description = 5 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 256
  ];

  // Output only. Creation time.
  google.protobuf.Timestamp create_time = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Update time.
  google.protobuf.Timestamp update_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Entity tag which users can pass to prevent race conditions. This
  // field is always set in server responses. See UpdateTagValueRequest for
  // details.
  string etag = 8 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Labels associated with this tag value.
  // Labels are key-value pairs that can be used to organize and track resources.
  map<string, string> annotations = 11 [(google.api.field_behavior) = OPTIONAL];
}

// The request message for listing TagValues for the specified TagKey.
message ListTagValuesRequest {
  // Required. The resource name of the parent TagKey.
  // Must be of the form `organizations/{org_id}/tagKeys/{tag_key}` or
  // `organizations/{org_id}/projects/{project}/tagKeys/{tag_key}`.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/TagValue"},
    (buf.validate.field).required = true
  ];

  // Optional. The maximum number of TagValues to return in the response. The
  // server allows a maximum of 300 TagValues to return. If unspecified, the
  // server will use 100 as the default.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A pagination token returned from a previous call to
  // `ListTagValues` that indicates where this listing should continue from.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. An expression for filtering the results of the request.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Specify how the results should be sorted.
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// The ListTagValues response.
message ListTagValuesResponse {
  // A possibly paginated list of TagValues that are direct descendants of
  // the specified parent TagKey.
  repeated TagValue tag_values = 1;

  // A pagination token returned from a previous call to `ListTagValues`
  // that indicates from where listing should continue. This is currently not
  // used, but the server may at any point start supplying a valid token.
  string next_page_token = 2;
}

// The request message for getting a TagValue.
message GetTagValueRequest {
  // Required. Resource name for TagValue to be fetched in the format
  // `organizations/{organization}/tagKeys/{tag_key}/tagValues/{tag_value}`.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/TagValue"},
    (buf.validate.field).required = true
  ];
}

// The request message for creating a TagValue.
message CreateTagValueRequest {
  // Required. The resource name of the parent TagKey.
  // Must be of the form `organizations/{org_id}/tagKeys/{tag_key}` or
  // `organizations/{org_id}/projects/{project}/tagKeys/{tag_key}`.
  string parent = 4 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.api/TagValue"},
    (buf.validate.field).required = true
  ];

  // Required. The TagValue to be created. Only fields `description`
  // are considered during the creation request.
  TagValue tag_value = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Required. The user-assigned short name for the TagValue.
  // Must be unique for TagValues within the same parent TagKey.
  string tag_value_id = 3 [(google.api.field_behavior) = REQUIRED];

  // Optional. Set as true to perform the validations necessary for creating the
  // resource, but not actually perform the action.
  bool validate_only = 2 [(google.api.field_behavior) = OPTIONAL];
}

// The request message for updating a TagValue.
message UpdateTagValueRequest {
  // Required. The new definition of the TagValue. Only fields `description` and
  // `etag` fields can be updated by this request. If the `etag` field is
  // nonempty, it must match the `etag` field of the existing ControlGroup.
  // Otherwise, `ABORTED` will be returned.
  TagValue tag_value = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. Fields to be updated.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, and the tag value is not found, a new tag value will be created.
  // In this situation, update_mask is ignored.
  bool allow_missing = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. True to perform validations necessary for updating the resource,
  // but not actually perform the action.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// The request message for deleting a TagValue.
message DeleteTagValueRequest {
  // Required. Resource name for TagValue to be deleted in the format
  // `organizations/{organization}/tagKeys/{tag_key}/tagValues/{tag_value}`.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.api/TagValue"},
    (buf.validate.field).required = true
  ];

  // Optional. Set as true to perform the validations necessary for deletion,
  // but not actually perform the action.
  bool validate_only = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The etag known to the client for the expected state of the
  // TagValue. This is to be used for optimistic concurrency.
  string etag = 3 [(google.api.field_behavior) = OPTIONAL];
}

// A status object which is used as the `metadata` field for the Operation
// returned by CreateTagValue.
message CreateTagValueMetadata {}

// A status object which is used as the `metadata` field for the Operation
// returned by UpdateTagValue.
message UpdateTagValueMetadata {}

// A status object which is used as the `metadata` field for the Operation
// returned by DeleteTagValue.
message DeleteTagValueMetadata {}
