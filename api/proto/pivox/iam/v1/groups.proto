syntax = "proto3";

package pivox.iam.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "pivox/iam/v1;iampb";

// Manages groups within an organization.
service Groups {
  option (google.api.default_host) = "api.pivox.io";

  // Gets a group by resource name.
  rpc GetGroup(GetGroupRequest) returns (Group) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/groups/*}"};
    option (google.api.method_signature) = "name";
  }

  // Lists groups in an organization.
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*}/groups"};
    option (google.api.method_signature) = "parent";
  }

  // Creates a new group.
  rpc CreateGroup(CreateGroupRequest) returns (Group) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*}/groups"
      body: "group"
    };
    option (google.api.method_signature) = "parent,group,group_id";
  }

  // Updates a group.
  rpc UpdateGroup(UpdateGroupRequest) returns (Group) {
    option (google.api.http) = {
      patch: "/v1/{group.name=organizations/*/groups/*}"
      body: "group"
    };
    option (google.api.method_signature) = "group,update_mask";
  }

  // Soft-deletes a group.
  rpc DeleteGroup(DeleteGroupRequest) returns (Group) {
    option (google.api.http) = {
      delete: "/v1/{name=organizations/*/groups/*}"
    };
    option (google.api.method_signature) = "name";
  }

  // Adds members to a group.
  rpc AddGroupMembers(AddGroupMembersRequest)
      returns (AddGroupMembersResponse) {
    option (google.api.http) = {
      post: "/v1/{group=organizations/*/groups/*}:addGroupMembers"
      body: "*"
    };
    option (google.api.method_signature) = "group,members";
  }

  // Removes members from a group.
  rpc RemoveGroupMembers(RemoveGroupMembersRequest)
      returns (RemoveGroupMembersResponse) {
    option (google.api.http) = {
      post: "/v1/{group=organizations/*/groups/*}:removeGroupMembers"
      body: "*"
    };
    option (google.api.method_signature) = "group,members";
  }

  // Lists members of a group.
  rpc ListGroupMembers(ListGroupMembersRequest)
      returns (ListGroupMembersResponse) {
    option (google.api.http) = {
      get: "/v1/{group=organizations/*/groups/*}/members"
    };
    option (google.api.method_signature) = "group";
  }
}

// A group of users within an organization.
message Group {
  option (google.api.resource) = {
    type: "pivox.iam/Group"
    pattern: "organizations/{organization}/groups/{group}"
    plural: "groups"
    singular: "group"
  };

  // The resource name of the group.
  // Format: `organizations/{organization}/groups/{group}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. A human-readable name for the group.
  string display_name = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {min_len: 1, max_len: 63}
  ];

  // Optional. A longer description of the group's purpose.
  string description = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 256
  ];

  // Output only. Timestamp when the group was created.
  google.protobuf.Timestamp create_time = 4
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the group was last modified.
  google.protobuf.Timestamp update_time = 5
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the group was soft-deleted.
  google.protobuf.Timestamp delete_time = 6
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the group will be permanently purged.
  google.protobuf.Timestamp purge_time = 7
      [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A checksum computed by the server based on the current value
  // of the Group resource.
  string etag = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Free-form annotations for the group.
  map<string, string> annotations = 9 [(google.api.field_behavior) = OPTIONAL];
}

// A membership of a user in a group.
message GroupMember {
  // The resource name of the user member.
  // Format: `organizations/{organization}/users/{user}`
  string member = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.iam/User"}
  ];

  // Output only. Timestamp when the membership was created.
  google.protobuf.Timestamp create_time = 2
      [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request message for `GetGroup`.
message GetGroupRequest {
  // Required. The resource name of the group.
  // Format: `organizations/{organization}/groups/{group}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.iam/Group"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// Request message for `ListGroups`.
message ListGroupsRequest {
  // Required. The parent organization.
  // Format: `organizations/{organization}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.iam/Group"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. Maximum number of groups to return.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {gte: 0, lte: 1000}
  ];

  // Optional. Page token from a previous ListGroups call.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. An AIP-160 filter expression.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Sort order (e.g. "display_name", "create_time desc").
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Whether to include soft-deleted groups.
  bool show_deleted = 6 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for `ListGroups`.
message ListGroupsResponse {
  // The groups in the organization.
  repeated Group groups = 1;

  // Token for the next page of results.
  string next_page_token = 2;
}

// Request message for `CreateGroup`.
message CreateGroupRequest {
  // Required. The parent organization.
  // Format: `organizations/{organization}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.iam/Group"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Required. The group to create.
  Group group = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. The server-generated group ID. If not provided, the server
  // will generate one.
  string group_id = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for `UpdateGroup`.
message UpdateGroupRequest {
  // Required. The group with updated fields.
  Group group = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. The fields to update. If omitted, all mutable fields are updated.
  google.protobuf.FieldMask update_mask = 2
      [(google.api.field_behavior) = OPTIONAL];
}

// Request message for `DeleteGroup`.
message DeleteGroupRequest {
  // Required. The resource name of the group to delete.
  // Format: `organizations/{organization}/groups/{group}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.iam/Group"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. The etag for optimistic concurrency control.
  string etag = 2 [(google.api.field_behavior) = OPTIONAL];
}

// Request message for `AddGroupMembers`.
message AddGroupMembersRequest {
  // Required. The resource name of the group.
  // Format: `organizations/{organization}/groups/{group}`
  string group = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.iam/Group"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Required. The user resource names to add as members.
  // Format: `organizations/{organization}/users/{user}`
  repeated string members = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).repeated = {min_items: 1, max_items: 100}
  ];
}

// Response message for `AddGroupMembers`.
message AddGroupMembersResponse {}

// Request message for `RemoveGroupMembers`.
message RemoveGroupMembersRequest {
  // Required. The resource name of the group.
  // Format: `organizations/{organization}/groups/{group}`
  string group = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.iam/Group"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Required. The user resource names to remove from the group.
  // Format: `organizations/{organization}/users/{user}`
  repeated string members = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).repeated = {min_items: 1, max_items: 100}
  ];
}

// Response message for `RemoveGroupMembers`.
message RemoveGroupMembersResponse {}

// Request message for `ListGroupMembers`.
// (-- api-linter: core::0132::request-parent-required=disabled
//     aip.dev/not-precedent: ListGroupMembers uses `group` as the parent-like field. --)
// (-- api-linter: core::0132::request-required-fields=disabled
//     aip.dev/not-precedent: ListGroupMembers uses `group` as the parent-like field. --)
// (-- api-linter: core::0132::request-unknown-fields=disabled
//     aip.dev/not-precedent: ListGroupMembers uses `group` as the parent-like field. --)
message ListGroupMembersRequest {
  // Required. The resource name of the group.
  // Format: `organizations/{organization}/groups/{group}`
  string group = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.iam/Group"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. Maximum number of members to return.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {gte: 0, lte: 1000}
  ];

  // Optional. Page token from a previous ListGroupMembers call.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for `ListGroupMembers`.
// (-- api-linter: core::0132::response-unknown-fields=disabled
//     aip.dev/not-precedent: Response contains GroupMember, a custom sub-resource. --)
message ListGroupMembersResponse {
  // The members of the group.
  repeated GroupMember members = 1;

  // Token for the next page of results.
  string next_page_token = 2;
}
