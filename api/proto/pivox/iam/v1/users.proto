syntax = "proto3";

package pivox.iam.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/protobuf/timestamp.proto";

option go_package = "pivox/iam/v1;iampb";

// Read-only service for users synced from Firebase Auth.
service Users {
  option (google.api.default_host) = "api.pivox.io";

  // Gets a user by resource name.
  rpc GetUser(GetUserRequest) returns (User) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/users/*}"};
    option (google.api.method_signature) = "name";
  }

  // Lists users in an organization.
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*}/users"};
    option (google.api.method_signature) = "parent";
  }
}

// A user within an organization. Users are synced from Firebase Auth and
// are read-only through this API.
message User {
  option (google.api.resource) = {
    type: "pivox.iam/User"
    pattern: "organizations/{organization}/users/{user}"
    plural: "users"
    singular: "user"
  };

  // The resource name of the user.
  // Format: `organizations/{organization}/users/{user}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Output only. The user's email address.
  string email = 2 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Whether the user's email address has been verified.
  bool email_verified = 3 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The user's display name.
  string display_name = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The URL of the user's profile photo.
  string photo_url = 5 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Whether the user account is disabled.
  bool disabled = 6 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the user was created.
  google.protobuf.Timestamp create_time = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the user was last modified.
  google.protobuf.Timestamp update_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp of the user's last login.
  google.protobuf.Timestamp last_login_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. A checksum computed by the server based on the current value
  // of the User resource.
  string etag = 10 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Request message for `GetUser`.
message GetUserRequest {
  // Required. The resource name of the user to retrieve.
  // Format: `organizations/{organization}/users/{user}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.iam/User"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// Request message for `ListUsers`.
message ListUsersRequest {
  // Required. The parent organization.
  // Format: `organizations/{organization}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.iam/User"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. Maximum number of users to return.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. Page token from a previous ListUsers call.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. An AIP-160 filter expression.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Sort order (e.g. "email", "display_name desc").
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// Response message for `ListUsers`.
message ListUsersResponse {
  // The users in the organization.
  repeated User users = 1;

  // Token for the next page of results.
  string next_page_token = 2;
}
