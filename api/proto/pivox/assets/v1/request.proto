syntax = "proto3";

package pivox.assets.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";
import "pivox/assets/v1/asset.proto";

option go_package = "pivox/assets/v1;assetsv1";

// Manages asset requests within a project. Requests represent the
// order workflow: a producer creates a request describing needed
// assets, optionally assigns an artist, the artist delivers assets
// for each line item, and the producer approves or requests revisions.
//
// A request can produce multiple assets via line items. Each line item
// creates a PLACEHOLDER asset that is fulfilled when the artist
// uploads the deliverable.
service Requests {
  option (google.api.default_host) = "api.pivox.io";

  // Creates a new request in the specified project. Line items can be
  // included in the request body — each line item creates a
  // PLACEHOLDER asset in the project.
  //
  // The caller must have `assets.requests.create` permission on the
  // parent project.
  rpc CreateRequest(CreateRequestRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*/projects/*}/requests"
      body: "request"
    };
    option (google.api.method_signature) = "parent,request";
    option (google.longrunning.operation_info) = {
      response_type: "Request"
      metadata_type: "CreateRequestMetadata"
    };
  }

  // Retrieves a request by resource name.
  rpc GetRequest(GetRequestRequest) returns (Request) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/projects/*/requests/*}"};
    option (google.api.method_signature) = "name";
  }

  // Lists requests in a project.
  rpc ListRequests(ListRequestsRequest) returns (ListRequestsResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*/projects/*}/requests"};
    option (google.api.method_signature) = "parent";
  }

  // Updates a request's mutable fields (display_name, description,
  // priority, due_time).
  rpc UpdateRequest(UpdateRequestRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1/{request.name=organizations/*/projects/*/requests/*}"
      body: "request"
    };
    option (google.api.method_signature) = "request,update_mask";
    option (google.longrunning.operation_info) = {
      response_type: "Request"
      metadata_type: "UpdateRequestMetadata"
    };
  }

  // Soft-deletes a request. Also soft-deletes any unfulfilled
  // PLACEHOLDER assets linked to its line items.
  rpc DeleteRequest(DeleteRequestRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/projects/*/requests/*}"};
    option (google.api.method_signature) = "name";
    option (google.longrunning.operation_info) = {
      response_type: "Request"
      metadata_type: "DeleteRequestMetadata"
    };
  }

  // Submits a draft request, making it visible to artists.
  // Transitions the request from DRAFT to OPEN.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: Returns the updated Request resource. --)
  rpc SubmitRequest(SubmitRequestRequest) returns (Request) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*/requests/*}:submit"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Assigns an artist to the request. Transitions the request to
  // IN_PROGRESS if currently OPEN. Can also reassign during
  // IN_PROGRESS.
  //
  // The caller must have `assets.requests.assign` permission.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: Returns the updated Request resource. --)
  rpc AssignRequest(AssignRequestRequest) returns (Request) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*/requests/*}:assign"
      body: "*"
    };
    option (google.api.method_signature) = "name,assignee";
  }

  // Self-assigns the calling user to an open request. Transitions the
  // request from OPEN to IN_PROGRESS with the caller as assignee.
  //
  // The caller must have `assets.requests.claim` permission.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: Returns the updated Request resource. --)
  rpc ClaimRequest(ClaimRequestRequest) returns (Request) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*/requests/*}:claim"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Marks the request as delivered by the artist. Transitions the
  // request from IN_PROGRESS to DELIVERED.
  //
  // The caller must have `assets.requests.deliver` permission.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: Returns the updated Request resource. --)
  rpc DeliverRequest(DeliverRequestRequest) returns (Request) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*/requests/*}:deliver"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Approves the delivered request. Transitions the request from
  // DELIVERED to APPROVED.
  //
  // The caller must have `assets.requests.approve` permission.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: Returns the updated Request resource. --)
  rpc ApproveRequest(ApproveRequestRequest) returns (Request) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*/requests/*}:approve"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Requests revisions from the artist. Transitions the request from
  // DELIVERED to REVISION_REQUESTED. The artist picks it up and it
  // moves back to IN_PROGRESS.
  //
  // The caller must have `assets.requests.approve` permission.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: Returns the updated Request resource. --)
  // (-- api-linter: core::0136::http-uri-suffix=disabled
  //     aip.dev/not-precedent: requestRevision is more descriptive than request. --)
  rpc RequestRevision(RequestRevisionRequest) returns (Request) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*/requests/*}:requestRevision"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Rejects the delivered request. Transitions the request from
  // DELIVERED to REJECTED.
  //
  // The caller must have `assets.requests.reject` permission.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: Returns the updated Request resource. --)
  rpc RejectRequest(RejectRequestRequest) returns (Request) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*/requests/*}:reject"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Cancels the request at any point. Transitions the request to
  // CANCELLED. Unfulfilled PLACEHOLDER assets remain but are not
  // deleted.
  //
  // The caller must have `assets.requests.cancel` permission.
  // (-- api-linter: core::0136::response-message-name=disabled
  //     aip.dev/not-precedent: Returns the updated Request resource. --)
  rpc CancelRequest(CancelRequestRequest) returns (Request) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*/requests/*}:cancel"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }

  // Creates a new line item on a request. A PLACEHOLDER asset is
  // created in the project and linked to the line item.
  //
  // The caller must have `assets.lineItems.create` permission.
  rpc CreateLineItem(CreateLineItemRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*/projects/*/requests/*}/lineItems"
      body: "line_item"
    };
    option (google.api.method_signature) = "parent,line_item";
    option (google.longrunning.operation_info) = {
      response_type: "LineItem"
      metadata_type: "CreateLineItemMetadata"
    };
  }

  // Retrieves a line item by resource name.
  rpc GetLineItem(GetLineItemRequest) returns (LineItem) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/projects/*/requests/*/lineItems/*}"};
    option (google.api.method_signature) = "name";
  }

  // Lists line items in a request.
  rpc ListLineItems(ListLineItemsRequest) returns (ListLineItemsResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*/projects/*/requests/*}/lineItems"};
    option (google.api.method_signature) = "parent";
  }

  // Updates a line item's mutable fields (display_name, description).
  rpc UpdateLineItem(UpdateLineItemRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1/{line_item.name=organizations/*/projects/*/requests/*/lineItems/*}"
      body: "line_item"
    };
    option (google.api.method_signature) = "line_item,update_mask";
    option (google.longrunning.operation_info) = {
      response_type: "LineItem"
      metadata_type: "UpdateLineItemMetadata"
    };
  }

  // Deletes a line item. Only allowed when the request is in DRAFT
  // or OPEN state. Also soft-deletes the linked PLACEHOLDER asset.
  rpc DeleteLineItem(DeleteLineItemRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/projects/*/requests/*/lineItems/*}"};
    option (google.api.method_signature) = "name";
    option (google.longrunning.operation_info) = {
      response_type: "LineItem"
      metadata_type: "DeleteLineItemMetadata"
    };
  }

  // Fulfills a line item by uploading a deliverable. The linked
  // PLACEHOLDER asset transitions to PROCESSING and runs the
  // ingestion pipeline. Returns an LRO tracking the ingestion.
  //
  // The caller must have `assets.lineItems.fulfill` permission.
  rpc FulfillLineItem(FulfillLineItemRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/projects/*/requests/*/lineItems/*}:fulfill"
      body: "*"
    };
    // (-- api-linter: client-libraries::4232::required-fields=disabled
    //     aip.dev/not-precedent: endpoint is contextually required. --)
    option (google.api.method_signature) = "name";
    option (google.longrunning.operation_info) = {
      response_type: "LineItem"
      metadata_type: "FulfillLineItemMetadata"
    };
  }
}

// A request represents an order for one or more assets. Producers
// create requests, assign artists, and approve deliverables. Each
// request contains line items that map to individual PLACEHOLDER
// assets.
message Request {
  option (google.api.resource) = {
    type: "pivox.assets/Request"
    pattern: "organizations/{organization}/projects/{project}/requests/{request}"
    plural: "requests"
    singular: "request"
  };

  // Request lifecycle states.
  enum State {
    // Unspecified state.
    STATE_UNSPECIFIED = 0;

    // Producer is composing the request. Not visible to artists.
    DRAFT = 1;

    // Submitted and awaiting artist assignment or self-claim.
    OPEN = 2;

    // An artist is actively working on the request.
    IN_PROGRESS = 3;

    // The artist has delivered all line items for review.
    DELIVERED = 4;

    // The producer has approved the deliverables.
    APPROVED = 5;

    // The producer has requested changes. The artist picks it up
    // and the request moves back to IN_PROGRESS.
    REVISION_REQUESTED = 6;

    // The producer has rejected the deliverables.
    REJECTED = 7;

    // The request was cancelled.
    CANCELLED = 8;
  }

  // Request priority levels.
  enum Priority {
    // Unspecified priority. Treated as NORMAL.
    PRIORITY_UNSPECIFIED = 0;

    // Low priority.
    LOW = 1;

    // Normal priority (default).
    NORMAL = 2;

    // High priority.
    HIGH = 3;

    // Urgent priority.
    URGENT = 4;
  }

  // Output only. The resource name of the request. Format:
  // `organizations/{organization}/projects/{project}/requests/{request}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. A human-readable title for the request.
  string display_name = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.max_len = 255
  ];

  // Optional. A detailed description of what is needed.
  string description = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 5000
  ];

  // Output only. The current lifecycle state.
  State state = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. The priority of the request.
  Priority priority = 5 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The assigned artist. Format: `users/{user}`
  string assignee = 6 [(google.api.field_behavior) = OPTIONAL];

  // Optional. The requested deadline.
  google.protobuf.Timestamp due_time = 7 [(google.api.field_behavior) = OPTIONAL];

  // Output only. When the artist marked the request as delivered.
  google.protobuf.Timestamp delivered_time = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. When the producer approved the request.
  google.protobuf.Timestamp approved_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Total number of line items.
  int32 line_item_count = 10 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Number of line items with fulfilled (ACTIVE) assets.
  int32 fulfilled_count = 11 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Line items belonging to this request. Populated on
  // GetRequest. Not populated on ListRequests for efficiency.
  // (-- api-linter: core::0122::embedded-resource=disabled
  //     aip.dev/not-precedent: Embedded for convenience; avoids extra RPC call. --)
  repeated LineItem line_items = 12 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Annotations associated with this request.
  map<string, string> annotations = 13 [(google.api.field_behavior) = OPTIONAL];

  // Output only. A checksum computed by the server.
  string etag = 14 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The user who created the request.
  string creator = 15 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The user who last updated the request.
  string updater = 16 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the request was created.
  google.protobuf.Timestamp create_time = 17 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the request was last modified.
  google.protobuf.Timestamp update_time = 18 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The time at which the request was soft-deleted.
  google.protobuf.Timestamp delete_time = 19 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The time at which the request will be permanently purged.
  google.protobuf.Timestamp purge_time = 20 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// A line item within a request. Each line item represents a single
// deliverable and is linked to a PLACEHOLDER asset that is fulfilled
// when the artist uploads the file.
message LineItem {
  option (google.api.resource) = {
    type: "pivox.assets/LineItem"
    pattern: "organizations/{organization}/projects/{project}/requests/{request}/lineItems/{line_item}"
    plural: "lineItems"
    singular: "lineItem"
  };

  // Line item states.
  enum State {
    // Unspecified state.
    STATE_UNSPECIFIED = 0;

    // Awaiting artist delivery.
    PENDING = 1;

    // Artist is working on this item.
    IN_PROGRESS = 2;

    // Artist uploaded the deliverable.
    DELIVERED = 3;

    // Producer approved this item.
    APPROVED = 4;

    // Producer requested changes on this item.
    REVISION_REQUESTED = 5;
  }

  // Output only. The resource name of the line item. Format:
  // `organizations/{organization}/projects/{project}/requests/{request}/lineItems/{line_item}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. A human-readable name for the deliverable.
  string display_name = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.max_len = 255
  ];

  // Optional. A description of what is expected for this deliverable.
  string description = 3 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).string.max_len = 2000
  ];

  // Output only. The current state of the line item.
  State state = 4 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The linked PLACEHOLDER asset. Created when the line
  // item is created. Transitions to ACTIVE when the artist fulfills
  // the line item.
  string asset = 5 [
    (google.api.field_behavior) = OUTPUT_ONLY,
    (google.api.resource_reference) = {type: "pivox.assets/Asset"}
  ];

  // Optional. The expected media type for this deliverable.
  Asset.MediaType media_type = 6 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Annotations associated with this line item.
  map<string, string> annotations = 7 [(google.api.field_behavior) = OPTIONAL];

  // Output only. The user who created this line item.
  string creator = 8 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when this line item was created.
  google.protobuf.Timestamp create_time = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when this line item was last modified.
  google.protobuf.Timestamp update_time = 10 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// The request sent to the CreateRequest method.
message CreateRequestRequest {
  // Required. The parent project. Format:
  // `organizations/{organization}/projects/{project}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.assets/Request"},
    (buf.validate.field).required = true
  ];

  // Required. The request to create. May include line items in the
  // line_items field — each will create a PLACEHOLDER asset.
  Request request = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. If set to true, validate only without persisting.
  bool validate_only = 3 [(google.api.field_behavior) = OPTIONAL];
}

// A status object for the CreateRequest LRO metadata.
message CreateRequestMetadata {}

// The request sent to the GetRequest method.
message GetRequestRequest {
  // Required. The resource name of the request to retrieve.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.assets/Request"},
    (buf.validate.field).required = true
  ];
}

// The request sent to the ListRequests method.
message ListRequestsRequest {
  // Required. The parent project whose requests are being listed.
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.assets/Request"},
    (buf.validate.field).required = true
  ];

  // Optional. The maximum number of requests to return.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A pagination token from a previous call.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. An expression for filtering the results.
  // Filterable fields:
  //
  // + `state`
  // + `priority`
  // + `assignee`
  // + `displayName`
  // + `creator`
  // + `createTime` (supports comparison operators)
  // + `dueTime` (supports comparison operators)
  //
  // Examples:
  //
  // + `state = OPEN` — only open requests.
  // + `assignee = "users/123"` — requests assigned to a user.
  // + `priority = URGENT` — urgent requests only.
  // + `state = IN_PROGRESS AND assignee = ""` — unassigned in-progress.
  //
  // For more information, see [AIP-160](https://aip.dev/160).
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. A comma-separated list of fields to order by.
  // Supported fields:
  //
  // + `displayName`
  // + `createTime`
  // + `updateTime`
  // + `dueTime`
  // + `priority`
  // + `name`
  //
  // Example: `priority desc, dueTime`
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If true, include soft-deleted requests in the response.
  bool show_deleted = 6 [(google.api.field_behavior) = OPTIONAL];
}

// The response from the ListRequests method.
message ListRequestsResponse {
  // The requests belonging to the specified project.
  repeated Request requests = 1;

  // A pagination token for the next page.
  string next_page_token = 2;
}

// The request sent to the UpdateRequest method.
message UpdateRequestRequest {
  // Required. The request with updated fields.
  Request request = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. An update mask to selectively update fields.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, validate only without persisting.
  bool validate_only = 3 [(google.api.field_behavior) = OPTIONAL];
}

// A status object for the UpdateRequest LRO metadata.
message UpdateRequestMetadata {}

// The request sent to the DeleteRequest method.
message DeleteRequestRequest {
  // Required. The resource name of the request to delete.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.assets/Request"},
    (buf.validate.field).required = true
  ];

  // Optional. The etag for optimistic concurrency.
  string etag = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If true, delete the request even if it has line items.
  bool force = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, validate only without persisting.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// A status object for the DeleteRequest LRO metadata.
message DeleteRequestMetadata {}

// The request sent to the SubmitRequest method.
message SubmitRequestRequest {
  // Required. The resource name of the request to submit.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.assets/Request"},
    (buf.validate.field).required = true
  ];
}

// The request sent to the AssignRequest method.
message AssignRequestRequest {
  // Required. The resource name of the request to assign.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.assets/Request"},
    (buf.validate.field).required = true
  ];

  // Required. The user to assign. Format: `users/{user}`
  string assignee = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

// The request sent to the ClaimRequest method.
message ClaimRequestRequest {
  // Required. The resource name of the request to claim.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.assets/Request"},
    (buf.validate.field).required = true
  ];
}

// The request sent to the DeliverRequest method.
message DeliverRequestRequest {
  // Required. The resource name of the request to mark as delivered.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.assets/Request"},
    (buf.validate.field).required = true
  ];
}

// The request sent to the ApproveRequest method.
message ApproveRequestRequest {
  // Required. The resource name of the request to approve.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.assets/Request"},
    (buf.validate.field).required = true
  ];
}

// The request sent to the RequestRevision method.
message RequestRevisionRequest {
  // Required. The resource name of the request needing revisions.
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.assets/Request"},
    (buf.validate.field).required = true
