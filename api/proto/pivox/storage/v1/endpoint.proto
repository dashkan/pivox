syntax = "proto3";

package pivox.storage.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/client.proto";
import "google/api/field_behavior.proto";
import "google/api/resource.proto";
import "google/longrunning/operations.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/timestamp.proto";

option go_package = "pivox/storage/v1;storagev1";

// Manages storage endpoints attached to a storage gateway. An endpoint
// represents an external storage backend (such as S3, Cloud Storage, or MinIO)
// that agents use to serve storage operations. All mutation RPCs return
// long-running operations.
service Endpoints {
  option (google.api.default_host) = "api.pivox.io";

  // Creates a new endpoint resource under the specified storage gateway.
  //
  // The caller must have `storage.endpoints.create` permission on the
  // parent storage gateway.
  rpc CreateEndpoint(CreateEndpointRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      post: "/v1/{parent=organizations/*/storageGateways/*}/endpoints"
      body: "endpoint"
    };
    option (google.api.method_signature) = "parent,endpoint,endpoint_id";
    option (google.longrunning.operation_info) = {
      response_type: "Endpoint"
      metadata_type: "CreateEndpointMetadata"
    };
  }

  // Fetches an endpoint resource identified by the specified resource name.
  rpc GetEndpoint(GetEndpointRequest) returns (Endpoint) {
    option (google.api.http) = {get: "/v1/{name=organizations/*/storageGateways/*/endpoints/*}"};
    option (google.api.method_signature) = "name";
  }

  // Lists endpoints belonging to a storage gateway that satisfy the
  // specified filter.
  rpc ListEndpoints(ListEndpointsRequest) returns (ListEndpointsResponse) {
    option (google.api.http) = {get: "/v1/{parent=organizations/*/storageGateways/*}/endpoints"};
    option (google.api.method_signature) = "parent";
  }

  // Updates an endpoint resource. Use the field mask to specify which
  // fields to update. Omitting the field mask updates all mutable fields.
  //
  // The caller must have `storage.endpoints.update` permission on the
  // specified endpoint.
  rpc UpdateEndpoint(UpdateEndpointRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {
      patch: "/v1/{endpoint.name=organizations/*/storageGateways/*/endpoints/*}"
      body: "endpoint"
    };
    option (google.api.method_signature) = "endpoint,update_mask";
    option (google.longrunning.operation_info) = {
      response_type: "Endpoint"
      metadata_type: "UpdateEndpointMetadata"
    };
  }

  // Deletes an endpoint resource. The endpoint is removed from the
  // storage gateway and agents stop serving requests for it.
  //
  // The caller must have `storage.endpoints.delete` permission on the
  // specified endpoint.
  rpc DeleteEndpoint(DeleteEndpointRequest) returns (google.longrunning.Operation) {
    option (google.api.http) = {delete: "/v1/{name=organizations/*/storageGateways/*/endpoints/*}"};
    option (google.api.method_signature) = "name";
    option (google.longrunning.operation_info) = {
      response_type: "Endpoint"
      metadata_type: "DeleteEndpointMetadata"
    };
  }

  // Sets or replaces the credentials used to access the storage backend.
  // The previous credentials are overwritten.
  //
  // (-- api-linter: core::0134::synonyms=disabled
  //     aip.dev/not-precedent: SetEndpointCredentials is a credential rotation action, not a standard Update. --)
  rpc SetEndpointCredentials(SetEndpointCredentialsRequest) returns (Endpoint) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/storageGateways/*/endpoints/*}:setCredentials"
      body: "*"
    };
    option (google.api.method_signature) = "name,credentials";
  }

  // Tests connectivity to the storage backend. Returns reachability
  // status, latency, and any error encountered.
  rpc TestEndpointConnection(TestEndpointConnectionRequest) returns (TestEndpointConnectionResponse) {
    option (google.api.http) = {
      post: "/v1/{name=organizations/*/storageGateways/*/endpoints/*}:testConnection"
      body: "*"
    };
    option (google.api.method_signature) = "name";
  }
}

// An endpoint represents an external storage backend attached to a
// storage gateway. Agents use endpoint configuration and credentials
// to serve storage operations against the backend.
message Endpoint {
  option (google.api.resource) = {
    type: "pivox.storage/Endpoint"
    pattern: "organizations/{organization}/storageGateways/{storage_gateway}/endpoints/{endpoint}"
    plural: "endpoints"
    singular: "endpoint"
  };

  // The storage engine type of the endpoint.
  enum Engine {
    // Unspecified engine. This is only useful for distinguishing unset values.
    ENGINE_UNSPECIFIED = 0;

    // Amazon S3 or S3-compatible storage.
    S3 = 1;

    // Pivox RustFS distributed storage engine.
    RUSTFS = 2;

    // Google Cloud Storage.
    GCS = 3;

    // MinIO object storage.
    MINIO = 4;
  }

  // Endpoint lifecycle states.
  enum State {
    // Unspecified state. This is only useful for distinguishing unset values.
    STATE_UNSPECIFIED = 0;

    // The endpoint is active and serving requests.
    ACTIVE = 1;

    // The endpoint has been deactivated and is not serving requests.
    INACTIVE = 2;

    // The endpoint's storage backend is unreachable.
    UNREACHABLE = 3;
  }

  // The state of the endpoint's stored credentials.
  enum CredentialState {
    // Unspecified credential state.
    CREDENTIAL_STATE_UNSPECIFIED = 0;

    // No credentials have been configured for this endpoint.
    UNSET = 1;

    // Credentials have been configured and are valid.
    SET = 2;

    // Credentials have been configured but are invalid or expired.
    INVALID = 3;
  }

  // Output only. The resource name of the endpoint. Format:
  // `organizations/{organization}/storageGateways/{storage_gateway}/endpoints/{endpoint}`
  string name = 1 [(google.api.field_behavior) = IDENTIFIER];

  // Required. A human-readable name for the endpoint.
  string display_name = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string = {max_len: 60}
  ];

  // Required. Immutable. The storage engine type. Cannot be changed after
  // creation -- delete and recreate the resource to use a different engine.
  Engine engine = 3 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.field_behavior) = IMMUTABLE
  ];

  // Required. The URI of the storage backend (e.g.
  // `https://s3.us-east-1.amazonaws.com`).
  string endpoint_uri = 4 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).string.uri = true
  ];

  // Required. The bucket or container name on the storage backend.
  string bucket = 5 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. The cloud region of the storage backend (e.g. `us-east-1`).
  string region = 6 [(google.api.field_behavior) = OPTIONAL];

  // Output only. The current lifecycle state of the endpoint.
  State state = 7 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Input only. Credentials used to access the storage backend. This field
  // is never returned in responses; use `credential_state` to check
  // whether credentials have been set.
  EndpointCredentials credentials = 8 [
    (google.api.field_behavior) = INPUT_ONLY,
    (google.api.field_behavior) = OPTIONAL
  ];

  // Output only. Indicates whether credentials are configured and valid.
  CredentialState credential_state = 9 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Optional. Annotations associated with this endpoint.
  // Annotations are key-value pairs that can be used to organize and
  // track resources.
  map<string, string> annotations = 10 [(google.api.field_behavior) = OPTIONAL];

  // Output only. A checksum computed by the server based on the current
  // value of the Endpoint resource. This may be sent on update and delete
  // requests to ensure the client has an up-to-date value before
  // proceeding.
  string etag = 11 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The resource name of the user who created the endpoint.
  string creator = 12 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. The resource name of the user who last updated the
  // endpoint.
  string updater = 13 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the endpoint was created.
  google.protobuf.Timestamp create_time = 14 [(google.api.field_behavior) = OUTPUT_ONLY];

  // Output only. Timestamp when the endpoint was last modified.
  google.protobuf.Timestamp update_time = 15 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// Credentials used to authenticate with a storage backend.
message EndpointCredentials {
  oneof credentials {
    // Access key credentials (e.g. for S3 or MinIO).
    AccessKeyCredentials access_key = 1;

    // IAM role credentials (e.g. for cross-account S3 access).
    IamRoleCredentials iam_role = 2;
  }
}

// Access key credentials consisting of an access key ID and secret.
message AccessKeyCredentials {
  // Required. The access key ID.
  string access_key_id = 1 [(google.api.field_behavior) = REQUIRED];

  // Required. The secret access key.
  string secret_access_key = 2 [(google.api.field_behavior) = REQUIRED];
}

// IAM role credentials for assuming a role in another account.
message IamRoleCredentials {
  // Required. The ARN of the IAM role to assume.
  string role_arn = 1 [(google.api.field_behavior) = REQUIRED];
}

// The request sent to the
// [CreateEndpoint][pivox.storage.v1.Endpoints.CreateEndpoint] method.
message CreateEndpointRequest {
  // Required. The parent storage gateway where the endpoint will be
  // created. Format:
  // `organizations/{organization}/storageGateways/{storage_gateway}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.storage/Endpoint"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Required. The endpoint to create.
  Endpoint endpoint = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. A unique identifier for the endpoint. If not provided, the
  // server will generate one.
  string endpoint_id = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 4 [(google.api.field_behavior) = OPTIONAL];
}

// A status object which is used as the `metadata` field for the Operation
// returned by CreateEndpoint.
message CreateEndpointMetadata {}

// The request sent to the
// [GetEndpoint][pivox.storage.v1.Endpoints.GetEndpoint] method.
message GetEndpointRequest {
  // Required. The resource name of the endpoint to retrieve. Format:
  // `organizations/{organization}/storageGateways/{storage_gateway}/endpoints/{endpoint}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.storage/Endpoint"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// The request sent to the
// [ListEndpoints][pivox.storage.v1.Endpoints.ListEndpoints] method.
message ListEndpointsRequest {
  // Required. The parent storage gateway whose endpoints are being listed.
  // Format: `organizations/{organization}/storageGateways/{storage_gateway}`
  string parent = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {child_type: "pivox.storage/Endpoint"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. The maximum number of endpoints to return in the response.
  // The server can return fewer endpoints than requested. If unspecified,
  // the server picks an appropriate default.
  int32 page_size = 2 [
    (google.api.field_behavior) = OPTIONAL,
    (buf.validate.field).int32 = {
      gte: 0
      lte: 1000
    }
  ];

  // Optional. A pagination token returned from a previous call to
  // `ListEndpoints` that indicates from where listing should continue.
  string page_token = 3 [(google.api.field_behavior) = OPTIONAL];

  // Optional. An AIP-160 filter expression. Supports filtering by
  // `state`, `engine`, `display_name`.
  string filter = 4 [(google.api.field_behavior) = OPTIONAL];

  // Optional. Sort order (e.g. "create_time desc").
  string order_by = 5 [(google.api.field_behavior) = OPTIONAL];
}

// The response returned from the
// [ListEndpoints][pivox.storage.v1.Endpoints.ListEndpoints] method.
message ListEndpointsResponse {
  // The endpoints belonging to the specified storage gateway.
  repeated Endpoint endpoints = 1;

  // A pagination token to be used to retrieve the next page of results.
  // If empty, this response contains the last page of results.
  string next_page_token = 2;
}

// The request sent to the
// [UpdateEndpoint][pivox.storage.v1.Endpoints.UpdateEndpoint] method.
message UpdateEndpointRequest {
  // Required. The endpoint with updated fields. The `name` field must be
  // populated to identify the endpoint to update.
  Endpoint endpoint = 1 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];

  // Optional. An update mask to selectively update fields. If not provided,
  // all mutable fields will be updated. See
  // [FieldMask](https://protobuf.dev/reference/protobuf/google.protobuf/#field-mask)
  // for more details.
  google.protobuf.FieldMask update_mask = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 3 [(google.api.field_behavior) = OPTIONAL];
}

// A status object which is used as the `metadata` field for the Operation
// returned by UpdateEndpoint.
message UpdateEndpointMetadata {}

// The request sent to the
// [DeleteEndpoint][pivox.storage.v1.Endpoints.DeleteEndpoint] method.
message DeleteEndpointRequest {
  // Required. The resource name of the endpoint to delete. Format:
  // `organizations/{organization}/storageGateways/{storage_gateway}/endpoints/{endpoint}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.storage/Endpoint"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Optional. The etag known to the client for the expected state of the
  // endpoint. This is to be used for optimistic concurrency.
  string etag = 2 [(google.api.field_behavior) = OPTIONAL];

  // Optional. If set to true, the request will only validate the request
  // without persisting it.
  bool validate_only = 3 [(google.api.field_behavior) = OPTIONAL];
}

// A status object which is used as the `metadata` field for the Operation
// returned by DeleteEndpoint.
message DeleteEndpointMetadata {}

// The request sent to the
// [SetEndpointCredentials][pivox.storage.v1.Endpoints.SetEndpointCredentials]
// method.
message SetEndpointCredentialsRequest {
  // Required. The resource name of the endpoint whose credentials are
  // being set. Format:
  // `organizations/{organization}/storageGateways/{storage_gateway}/endpoints/{endpoint}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.storage/Endpoint"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];

  // Required. The credentials to set on the endpoint.
  EndpointCredentials credentials = 2 [
    (google.api.field_behavior) = REQUIRED,
    (buf.validate.field).required = true
  ];
}

// The request sent to the
// [TestEndpointConnection][pivox.storage.v1.Endpoints.TestEndpointConnection]
// method.
message TestEndpointConnectionRequest {
  // Required. The resource name of the endpoint to test. Format:
  // `organizations/{organization}/storageGateways/{storage_gateway}/endpoints/{endpoint}`
  string name = 1 [
    (google.api.field_behavior) = REQUIRED,
    (google.api.resource_reference) = {type: "pivox.storage/Endpoint"},
    (buf.validate.field).cel = {
      id: "required"
      message: "value is required"
      expression: "this.size() > 0"
    }
  ];
}

// The response returned from the
// [TestEndpointConnection][pivox.storage.v1.Endpoints.TestEndpointConnection]
// method.
message TestEndpointConnectionResponse {
  // Whether the storage backend is reachable.
  bool reachable = 1;

  // The round-trip latency to the storage backend.
  google.protobuf.Duration latency = 2;

  // An error message if the connection test failed. Empty on success.
  string error = 3;
}
