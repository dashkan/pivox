daemon off;

events {}

http {
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml font/woff2;
    gzip_min_length 256;
    gzip_vary on;

    server {
        listen 8081;
        http2 on;

        # gRPC (native HTTP/2 clients like grpcurl)
        location /pivox. {
            grpc_pass grpc://127.0.0.1:50051;
        }
        location /google. {
            grpc_pass grpc://127.0.0.1:50051;
        }
        location /grpc.reflection. {
            grpc_pass grpc://127.0.0.1:50051;
        }

        # Debug endpoints
        location /healthz {
            proxy_pass http://127.0.0.1:9090;
        }
        location /readyz {
            proxy_pass http://127.0.0.1:9090;
        }

        # REST gateway (internal + public)
        location /internal/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /v1/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # TanStack DevTools SSE — needs long timeout and no buffering
        location /__tsd/ {
            proxy_pass http://[::1]:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
        }

        # Hashed static assets — immutable cache
        location /assets/ {
            proxy_pass http://[::1]:3000;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Web app
        location / {
            proxy_pass http://[::1]:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (HMR)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
